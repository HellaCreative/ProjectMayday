<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f9fb" />
  <title>DIRT. Map</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f7f9fb'/%3E%3Cpath d='M12 42h40' stroke='%230a66c2' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M16 24h32' stroke='%23162433' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>
  <style>
    :root {
      --bg: #f7f9fb;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-2: #eef3f7;
      --line: rgba(24, 39, 55, 0.18);
      --text: #162433;
      --muted: #536170;
      --accent: #0a66c2;
      --paved: #d87900;
      --gravel: #5d6874;
      --atv: #0a66c2;
      --single: #6d36c9;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    #map { position: absolute; inset: 0; }

    .topbar {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      pointer-events: auto;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(12px);
    }
    .brand span { color: var(--accent); }

    .pill {
      pointer-events: auto;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      color: var(--muted);
      text-align: right;
    }
    .pill strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-top: 2px;
    }
    .pill.ready { border-color: rgba(10, 102, 194, 0.42); }
    .pill.ready strong { color: var(--accent); }

    .status {
      position: absolute;
      top: calc(max(12px, env(safe-area-inset-top)) + 64px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      white-space: nowrap;
      max-width: calc(100vw - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status.ok { color: var(--accent); }
    .status.error { color: #c1122f; border-color: rgba(193, 18, 47, 0.35); }

    .stack {
      position: absolute;
      right: 12px;
      bottom: max(176px, calc(env(safe-area-inset-bottom) + 164px));
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
    .btn:active { transform: scale(0.96); }

    .panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(12px, calc(env(safe-area-inset-bottom) + 12px));
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(14px);
      max-height: min(48vh, 360px);
      overflow: auto;
    }
    .panel.hidden { display: none; }
    .panel h2 {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .panel p {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
      margin-bottom: 12px;
    }
    .meta {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.5;
      padding: 10px 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .legend {
      position: absolute;
      left: 12px;
      top: calc(max(12px, env(safe-area-inset-top)) + 118px);
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 160px;
    }
    .legend-group + .legend-group {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .legend-title {
      display: block;
      margin-bottom: 7px;
      color: var(--text);
      font-size: 0.62rem;
    }
    .legend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 24px;
      margin-bottom: 5px;
    }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-label { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .legend i { width: 18px; height: 2px; border-radius: 2px; display: block; flex: 0 0 auto; }
    .legend i.dash {
      background: repeating-linear-gradient(90deg, var(--single) 0 4px, transparent 4px 7px);
      height: 2px;
    }
    .switch {
      position: relative;
      display: inline-flex;
      width: 34px;
      height: 18px;
      flex: 0 0 auto;
    }
    .switch input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
    }
    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(93, 104, 116, 0.3);
      border: 1px solid rgba(24, 39, 55, 0.22);
      transition: background 140ms ease;
    }
    .switch span::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.22);
      transition: transform 140ms ease;
    }
    .switch input:checked + span { background: var(--accent); border-color: transparent; }
    .switch input:checked + span::after { transform: translateX(16px); }
    .switch input:focus-visible + span {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .popup {
      position: absolute;
      z-index: 30;
      width: min(300px, calc(100vw - 24px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(14px);
      display: none;
    }
    .popup.visible { display: block; }
    .popup .k {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .popup .v { font-size: 0.95rem; margin-bottom: 10px; }
    .popup .v:last-child { margin-bottom: 0; }
    .popup .close {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px; border: 0; background: transparent;
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
    }

    .maplibregl-ctrl-bottom-right {
      right: 12px !important;
      bottom: max(12px, env(safe-area-inset-bottom)) !important;
      display: flex !important;
      flex-direction: column-reverse !important;
      align-items: flex-end !important;
      gap: 10px !important;
    }
    .maplibregl-ctrl-bottom-right .maplibregl-ctrl { margin: 0 !important; }
    .maplibregl-ctrl-group {
      background: var(--panel) !important;
      border: 1px solid var(--line) !important;
      border-radius: 16px !important;
      overflow: hidden;
      box-shadow: none !important;
    }
    .maplibregl-ctrl-group button {
      width: 52px !important;
      height: 52px !important;
      background-color: transparent !important;
    }
    .maplibregl-ctrl-attrib {
      background: var(--panel) !important;
      color: var(--muted) !important;
      border: 1px solid var(--line) !important;
      border-radius: 12px !important;
      font-family: var(--mono) !important;
      font-size: 0.62rem !important;
    }
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) {
      width: 28px !important;
      height: 28px !important;
      padding: 0 !important;
    }
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) .maplibregl-ctrl-attrib-inner {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <a class="brand" href="../index.html">DIRT<span>.</span></a>
    <div class="pill" id="modePill">Trails<strong id="modeLabel">Loading…</strong></div>
  </div>

  <div class="status" id="status">Loading bundled NS trails…</div>

  <div class="legend">
    <div class="legend-group">
      <span class="legend-title">Track type</span>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--paved)"></i>Paved road</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="paved" checked aria-label="Toggle paved roads"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--gravel)"></i>Gravel road</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="gravel" checked aria-label="Toggle gravel roads"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--atv)"></i>ATV trail</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="atv" checked aria-label="Toggle ATV trails"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i class="dash"></i>Single track</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="single" checked aria-label="Toggle single track"><span></span></span>
      </label>
    </div>
    <div class="legend-group">
      <span class="legend-title">Data sources</span>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--text)"></i>OSM NS</span>
        <span class="switch"><input type="checkbox" data-source-toggle="osm" checked aria-label="Toggle OSM Nova Scotia source"><span></span></span>
      </label>
    </div>
  </div>

  <div class="stack">
    <button class="btn" id="panelBtn" title="Data info" aria-label="Data info">ℹ</button>
    <button class="btn primary" id="recenterBtn" title="Recenter" aria-label="Recenter">◎</button>
  </div>

  <div class="panel hidden" id="panel">
    <h2>Bundled trail data</h2>
    <p>
      Nova Scotia dirt tracks are compiled into this build from OpenStreetMap
      (Geofabrik extract). No Overpass call. No scan-on-pan. The app already has the trails.
    </p>
    <div class="meta" id="dataMeta">Loading metadata…</div>
  </div>

  <div class="popup" id="popup">
    <button class="close" id="popupClose" aria-label="Close">×</button>
    <div id="popupBody"></div>
  </div>

  <script>
    const FALLBACK = { lng: -63.2985, lat: 44.7427, name: "Porter's Lake, NS" };
    const BUNDLED_TRAILS_URL = "/app/data/ns-trails.geojson.gz";
    const BUNDLED_META_URL = "/app/data/ns-trails.meta.json";
    const SHORTBREAD_STYLE_URL = "/app/data/shortbread-style.json";

    const TRACK_TYPES = {
      paved: { label: "Paved road", color: "#d87900", layers: ["trails-paved"] },
      gravel: { label: "Gravel road", color: "#5d6874", layers: ["trails-gravel"] },
      atv: { label: "ATV trail", color: "#0a66c2", layers: ["trails-atv"] },
      single: { label: "Single track", color: "#6d36c9", layers: ["trails-single"] }
    };
    const TRAIL_LAYER_IDS = Object.values(TRACK_TYPES).flatMap((type) => type.layers);
    const SOURCE_LAYER_MAP = { osm: TRAIL_LAYER_IDS };
    const layerEnabled = { paved: true, gravel: true, atv: true, single: true };
    const sourceEnabled = { osm: true };

    const db = new Dexie("dirt_bundled_v1");
    db.version(1).stores({
      bundled: "id"
    });

    let rider = { ...FALLBACK };
    let trailCount = 0;

    const statusEl = document.getElementById("status");
    const modePill = document.getElementById("modePill");
    const modeLabel = document.getElementById("modeLabel");
    const panel = document.getElementById("panel");
    const dataMeta = document.getElementById("dataMeta");
    const popupEl = document.getElementById("popup");
    const popupBody = document.getElementById("popupBody");

    function surfaceValue(feature) {
      return String(feature.properties?.surface || "").toLowerCase();
    }

    function classifyTrack(feature) {
      const p = feature.properties || {};
      const surface = surfaceValue(feature);
      if (p.grade === "single" || p.highway === "path" || p.highway === "bridleway") return "single";
      if (/^(paved|asphalt|concrete|paving_stones|sett|cobblestone)$/.test(surface) || p.tracktype === "grade1") return "paved";
      if (p.grade === "g4" || p.grade === "g5" || p.tracktype === "grade4" || p.tracktype === "grade5") return "atv";
      return "gravel";
    }

    function addTrackTypes(fc) {
      return {
        ...fc,
        features: (fc.features || []).map((feature) => ({
          ...feature,
          properties: {
            ...(feature.properties || {}),
            trackClass: classifyTrack(feature)
          }
        }))
      };
    }

    function applyLayerVisibility() {
      if (!map || !map.isStyleLoaded()) return;
      for (const [key, config] of Object.entries(TRACK_TYPES)) {
        for (const layerId of config.layers) {
          const sourceVisible = Object.entries(SOURCE_LAYER_MAP).some(([source, layerIds]) => {
            return layerIds.includes(layerId) && sourceEnabled[source];
          });
          const visible = layerEnabled[key] && sourceVisible ? "visible" : "none";
          if (map.getLayer(layerId)) map.setLayoutProperty(layerId, "visibility", visible);
        }
      }
    }

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function setReady(count) {
      trailCount = count;
      modePill.className = "pill ready";
      modeLabel.textContent = count.toLocaleString() + " bundled";
    }

    async function fetchGzipJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);
      if (typeof DecompressionStream === "undefined") {
        throw new Error("Gzip decompress not supported in this browser");
      }
      const stream = res.body.pipeThrough(new DecompressionStream("gzip"));
      const text = await new Response(stream).text();
      return JSON.parse(text);
    }

    async function loadBundledTrails() {
      const cached = await db.bundled.get("ns-trails");
      if (cached && cached.featureCollection && cached.featureCollection.features) {
        setStatus("Loaded " + cached.featureCollection.features.length.toLocaleString() + " trails from device cache", "ok");
        return cached.featureCollection;
      }

      setStatus("Loading bundled NS trails…");
      const fc = await fetchGzipJson(BUNDLED_TRAILS_URL);
      try {
        await db.bundled.put({
          id: "ns-trails",
          featureCollection: fc,
          cachedAt: Date.now()
        });
      } catch (err) {
        console.warn("Could not cache trails in IndexedDB", err);
      }
      return fc;
    }

    async function loadMeta() {
      try {
        const meta = await (await fetch(BUNDLED_META_URL)).json();
        dataMeta.innerHTML =
          "Features: " + (meta.featureCount || 0).toLocaleString() + "<br>" +
          "Pack size: ~" + ((meta.gzBytes || 0) / (1024 * 1024)).toFixed(1) + " MB gzipped<br>" +
          "Built: " + (meta.generatedAt ? new Date(meta.generatedAt).toLocaleString() : "unknown") + "<br>" +
          "Source: Geofabrik Nova Scotia OSM";
      } catch (_) {
        dataMeta.textContent = "Metadata unavailable";
      }
    }

    const map = new maplibregl.Map({
      container: "map",
      style: SHORTBREAD_STYLE_URL,
      center: [FALLBACK.lng, FALLBACK.lat],
      zoom: 11.5,
      attributionControl: false
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "bottom-right");
    map.addControl(new maplibregl.AttributionControl({ compact: true }), "bottom-right");

    function collapseAttribution() {
      const el = document.querySelector(".maplibregl-ctrl-attrib");
      if (el) el.classList.remove("maplibregl-compact-show");
    }

    function tuneShortbreadContrast() {
      const layers = map.getStyle().layers || [];
      for (const layer of layers) {
        const id = layer.id || "";
        if (layer.type === "fill") {
          if (id.includes("water")) {
            map.setPaintProperty(id, "fill-color", "#8fc7d8");
          } else if (id.includes("forest")) {
            map.setPaintProperty(id, "fill-color", "#9fbe89");
          } else if (id.includes("park") || id.includes("recreation") || id.includes("grass")) {
            map.setPaintProperty(id, "fill-color", "#b8d795");
            map.setPaintProperty(id, "fill-opacity", 0.78);
          } else if (id.includes("residential")) {
            map.setPaintProperty(id, "fill-color", "#d2d5d8");
          } else if (id.includes("farmland") || id.includes("farmyard")) {
            map.setPaintProperty(id, "fill-color", "#ead7bb");
          }
        }

        if (layer.type === "line") {
          if (id.includes("motorway")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#496682" : "#78a6d8");
          } else if (id.includes("trunk") || id.includes("primary")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#8b4a4a" : "#e08b8b");
          } else if (id.includes("secondary")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#9a6a30" : "#f2b35f");
          } else if (id.includes("tertiary")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#8d8128" : "#f4df63");
          } else if (id.includes("unclassified") || id.includes("service") || id.includes("living_street")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#6f7478" : "#ffffff");
          } else if (id.includes("track") || id.includes("path") || id.includes("bridleway")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#111820" : "#111820");
          } else if (id.includes("water")) {
            map.setPaintProperty(id, "line-color", "#6aa9c2");
          }
        }

        if (layer.type === "symbol") {
          if (id.includes("label") || id.includes("pois") || id.includes("street")) {
            if (layer.paint && Object.prototype.hasOwnProperty.call(layer.paint, "text-color")) {
              map.setPaintProperty(id, "text-color", "#15202b");
            }
            if (layer.paint && Object.prototype.hasOwnProperty.call(layer.paint, "text-halo-color")) {
              map.setPaintProperty(id, "text-halo-color", "#ffffff");
              map.setPaintProperty(id, "text-halo-width", 1.6);
            }
          }
        }
      }
    }

    function ensureLayers() {
      if (map.getSource("trails")) return;
      map.addSource("trails", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] }
      });
      map.addLayer({
        id: "trails-paved",
        type: "line",
        source: "trails",
        filter: ["==", ["get", "trackClass"], "paved"],
        paint: {
          "line-color": TRACK_TYPES.paved.color,
          "line-width": 2,
          "line-opacity": 0.98
        }
      });
      map.addLayer({
        id: "trails-gravel",
        type: "line",
        source: "trails",
        filter: ["==", ["get", "trackClass"], "gravel"],
        paint: {
          "line-color": TRACK_TYPES.gravel.color,
          "line-width": 2,
          "line-opacity": 0.98
        }
      });
      map.addLayer({
        id: "trails-atv",
        type: "line",
        source: "trails",
        filter: ["==", ["get", "trackClass"], "atv"],
        paint: {
          "line-color": TRACK_TYPES.atv.color,
          "line-width": 2,
          "line-opacity": 0.98
        }
      });
      map.addLayer({
        id: "trails-single",
        type: "line",
        source: "trails",
        filter: ["==", ["get", "trackClass"], "single"],
        paint: {
          "line-color": TRACK_TYPES.single.color,
          "line-width": 2,
          "line-dasharray": [1.2, 1.6],
          "line-opacity": 0.95
        }
      });
      applyLayerVisibility();
      map.addSource("rider", {
        type: "geojson",
        data: {
          type: "FeatureCollection",
          features: [{
            type: "Feature",
            geometry: { type: "Point", coordinates: [rider.lng, rider.lat] },
            properties: {}
          }]
        }
      });
      map.addLayer({
        id: "rider-halo",
        type: "circle",
        source: "rider",
        paint: {
          "circle-radius": 18,
          "circle-color": "#0a66c2",
          "circle-opacity": 0.2,
          "circle-blur": 0.6
        }
      });
      map.addLayer({
        id: "rider-core",
        type: "circle",
        source: "rider",
        paint: {
          "circle-radius": 7,
          "circle-color": "#0a66c2",
          "circle-stroke-width": 2,
          "circle-stroke-color": "#ffffff"
        }
      });
    }

    function setRider(lng, lat) {
      rider = { lng, lat };
      if (map.getSource("rider")) {
        map.getSource("rider").setData({
          type: "FeatureCollection",
          features: [{
            type: "Feature",
            geometry: { type: "Point", coordinates: [lng, lat] },
            properties: {}
          }]
        });
      }
    }

    function hidePopup() { popupEl.classList.remove("visible"); }

    function showPopup(feature, point) {
      const p = feature.properties || {};
      const trackType = TRACK_TYPES[p.trackClass] || TRACK_TYPES.gravel;
      popupBody.innerHTML =
        '<div class="k">Type</div><div class="v">' + (p.highway || "unspecified") + (p.name ? " · " + p.name : "") + "</div>" +
        '<div class="k">Track class</div><div class="v" style="color:' + trackType.color + '">' + trackType.label + "</div>" +
        '<div class="k">OSM detail</div><div class="v">' + (p.grade || "unknown") + (p.tracktype ? " · " + p.tracktype : "") + "</div>" +
        '<div class="k">Surface</div><div class="v">' + (p.surface || "unspecified") + "</div>" +
        '<div class="k">Motor access</div><div class="v">' + (p.accessStatus || "unknown") + (p.accessDetail ? " · " + p.accessDetail : "") + "</div>" +
        '<div class="k">Source</div><div class="v">Bundled OSM (Geofabrik NS)</div>';
      const pad = 12;
      const w = Math.min(300, window.innerWidth - 24);
      let left = point.x - w / 2;
      left = Math.max(pad, Math.min(left, window.innerWidth - w - pad));
      let top = point.y - 180;
      if (top < pad + 70) top = point.y + 18;
      popupEl.style.left = left + "px";
      popupEl.style.top = top + "px";
      popupEl.classList.add("visible");
    }

    map.on("load", async () => {
      tuneShortbreadContrast();
      ensureLayers();
      collapseAttribution();
      loadMeta();

      try {
        const t0 = performance.now();
        const fc = addTrackTypes(await loadBundledTrails());
        map.getSource("trails").setData(fc);
        const ms = Math.round(performance.now() - t0);
        setReady(fc.features.length);
        setStatus(
          fc.features.length.toLocaleString() + " NS trails ready · " + ms + " ms",
          "ok"
        );
      } catch (err) {
        console.error(err);
        setStatus("Failed to load bundled trails · " + (err.message || "error"), "error");
        modeLabel.textContent = "Load failed";
      }

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setRider(pos.coords.longitude, pos.coords.latitude);
            map.flyTo({ center: [rider.lng, rider.lat], zoom: 11.5 });
          },
          () => setRider(FALLBACK.lng, FALLBACK.lat),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    });

    map.once("idle", collapseAttribution);

    map.on("click", (e) => {
      const hits = map.queryRenderedFeatures(e.point, {
        layers: TRAIL_LAYER_IDS
      });
      if (!hits.length) {
        hidePopup();
        return;
      }
      showPopup(hits[0], e.point);
    });

    document.getElementById("popupClose").addEventListener("click", hidePopup);
    document.getElementById("panelBtn").addEventListener("click", () => {
      panel.classList.toggle("hidden");
    });
    document.getElementById("recenterBtn").addEventListener("click", () => {
      map.flyTo({ center: [rider.lng, rider.lat], zoom: Math.max(map.getZoom(), 11.5) });
    });
    document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
      input.addEventListener("change", () => {
        layerEnabled[input.dataset.layerToggle] = input.checked;
        applyLayerVisibility();
      });
    });
    document.querySelectorAll("[data-source-toggle]").forEach((input) => {
      input.addEventListener("change", () => {
        sourceEnabled[input.dataset.sourceToggle] = input.checked;
        applyLayerVisibility();
      });
    });
  </script>
</body>
</html>
