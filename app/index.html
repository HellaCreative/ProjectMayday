<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0e" />
  <title>DIRT. Offline POC</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>
  <style>
    :root {
      --bg: #0b0c0e;
      --panel: #141619;
      --panel-2: #1b1e22;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2f0eb;
      --muted: #8b8f96;
      --amber: #ff8a1e;
      --g2: #6ee7a8;
      --g3: #ffd24a;
      --g4: #ff8a1e;
      --g5: #ff4d4d;
      --single: #b98bff;
      --unknown: #6b7078;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    #map { position: absolute; inset: 0; }

    .topbar {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      pointer-events: auto;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--text);
      background: rgba(20, 22, 25, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(12px);
    }
    .brand span { color: var(--amber); }

    .pill {
      pointer-events: auto;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(20, 22, 25, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      color: var(--muted);
      text-align: right;
    }
    .pill strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-top: 2px;
    }
    .pill.offline { border-color: rgba(110, 231, 168, 0.45); color: var(--g2); }
    .pill.offline strong { color: var(--g2); }
    .pill.live { border-color: rgba(255, 138, 30, 0.35); }

    .status {
      position: absolute;
      top: calc(max(12px, env(safe-area-inset-top)) + 64px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(20, 22, 25, 0.92);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      white-space: nowrap;
      max-width: calc(100vw - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status.ok { color: var(--g2); }
    .status.error { color: #ff8a8a; border-color: rgba(255, 77, 77, 0.35); }

    .stack {
      position: absolute;
      right: 12px;
      bottom: max(120px, calc(env(safe-area-inset-bottom) + 110px));
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(20, 22, 25, 0.92);
      backdrop-filter: blur(12px);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .btn.amber { background: var(--amber); border-color: transparent; color: #111; }
    .btn:active { transform: scale(0.96); }

    .panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(12px, calc(env(safe-area-inset-bottom) + 12px));
      z-index: 20;
      background: rgba(20, 22, 25, 0.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(14px);
      max-height: min(58vh, 480px);
      overflow: auto;
    }
    .panel.hidden { display: none; }

    .panel h2 {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 64px;
    }

    input[type="range"] { flex: 1; accent-color: var(--amber); }
    .val {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
      min-width: 52px;
      text-align: right;
    }

    .estimate {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 8px 0 12px;
      padding: 10px 12px;
      background: var(--panel-2);
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action {
      flex: 1;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0 14px;
    }
    .action.primary {
      background: var(--amber);
      border-color: transparent;
      color: #111;
      font-weight: 700;
    }
    .action:disabled { opacity: 0.45; cursor: not-allowed; }

    .progress {
      display: none;
      margin-top: 10px;
      height: 8px;
      border-radius: 999px;
      background: var(--panel-2);
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .progress.on { display: block; }
    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--amber);
      transition: width 0.15s ease;
    }

    .regions { margin-top: 14px; }
    .region {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      font-size: 0.86rem;
    }
    .region .meta {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .region button {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .legend {
      position: absolute;
      left: 12px;
      top: calc(max(12px, env(safe-area-inset-top)) + 118px);
      z-index: 20;
      background: rgba(20, 22, 25, 0.92);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .legend div { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .legend div:last-child { margin-bottom: 0; }
    .legend i { width: 18px; height: 3px; border-radius: 2px; display: block; }
    .legend i.dash { background: repeating-linear-gradient(90deg, var(--single) 0 4px, transparent 4px 7px); height: 2px; }

    .popup {
      position: absolute;
      z-index: 30;
      width: min(300px, calc(100vw - 24px));
      background: rgba(20, 22, 25, 0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(14px);
      display: none;
    }
    .popup.visible { display: block; }
    .popup .k {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .popup .v { font-size: 0.95rem; margin-bottom: 10px; }
    .popup .v:last-child { margin-bottom: 0; }
    .popup .close {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px; border: 0; background: transparent;
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
    }

    .maplibregl-ctrl-bottom-right {
      right: 12px !important;
      bottom: max(150px, calc(env(safe-area-inset-bottom) + 142px)) !important;
    }
    .maplibregl-ctrl-group {
      background: rgba(20, 22, 25, 0.92) !important;
      border: 1px solid var(--line) !important;
      border-radius: 16px !important;
      overflow: hidden;
      box-shadow: none !important;
    }
    .maplibregl-ctrl-group button {
      width: 52px !important;
      height: 52px !important;
      background-color: transparent !important;
    }
    .maplibregl-ctrl button.maplibregl-ctrl-zoom-in .maplibregl-ctrl-icon,
    .maplibregl-ctrl button.maplibregl-ctrl-zoom-out .maplibregl-ctrl-icon {
      filter: invert(1) brightness(1.2);
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <a class="brand" href="../index.html">DIRT<span>.</span></a>
    <div class="pill live" id="modePill">Mode<strong id="modeLabel">Live tiles</strong></div>
  </div>

  <div class="status" id="status">Ready</div>

  <div class="legend">
    <div><i style="background:var(--g2)"></i>G2 solid</div>
    <div><i style="background:var(--g3)"></i>G3 mixed</div>
    <div><i style="background:var(--g4)"></i>G4 rough</div>
    <div><i style="background:var(--g5)"></i>G5 sparse</div>
    <div><i class="dash"></i>Single</div>
    <div><i style="background:var(--unknown)"></i>Unknown</div>
  </div>

  <div class="stack">
    <button class="btn" id="panelBtn" title="Download / regions" aria-label="Download regions">⬇</button>
    <button class="btn" id="refreshBtn" title="Reload local region" aria-label="Reload local">↻</button>
    <button class="btn" id="recenterBtn" title="Recenter" aria-label="Recenter">◎</button>
  </div>

  <div class="panel" id="panel">
    <h2>Download region</h2>
    <div class="row">
      <label>Radius</label>
      <input type="range" id="radius" min="25" max="500" step="5" value="30" />
      <div class="val" id="radiusVal">30 km</div>
    </div>
    <div class="estimate" id="estimate">Tap map or use GPS for center. Default radius kept small for testing.</div>
    <div class="actions">
      <button class="action" id="useGpsBtn" type="button">Use GPS</button>
      <button class="action" id="pickCenterBtn" type="button">Pick center</button>
      <button class="action primary" id="downloadBtn" type="button">Download</button>
    </div>
    <div class="progress" id="progress"><i id="progressBar"></i></div>
    <div class="regions" id="regionList"></div>
  </div>

  <div class="popup" id="popup">
    <button class="close" id="popupClose" aria-label="Close">×</button>
    <div id="popupBody"></div>
  </div>

  <script>
    const FALLBACK = { lng: -63.2985, lat: 44.7427, name: "Porter's Lake, NS" };
    const ZOOM_MIN = 10;
    const ZOOM_MAX = 14;
    // Estimate covers base + label layers at z10-z14
    const BYTES_PER_TILE = 28000;
    const TILE_LAYERS = 2;
    const OVERPASS_ENDPOINTS = [
      "https://overpass-api.de/api/interpreter",
      "https://overpass.kumi.systems/api/interpreter",
      "https://maps.mail.ru/osm/tools/overpass/api/interpreter"
    ];
    const CARTO_BASE = "https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png";
    const CARTO_LABELS = "https://a.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}@2x.png";

    const GRADE_COLOR = {
      g2: "#6ee7a8",
      g3: "#ffd24a",
      g4: "#ff8a1e",
      g5: "#ff4d4d",
      single: "#b98bff",
      unknown: "#6b7078"
    };

    const db = new Dexie("dirt_offline_poc");
    db.version(1).stores({
      regions: "id, createdAt",
      trails: "regionId",
      tiles: "key, regionId"
    });

    let rider = { ...FALLBACK };
    let downloadCenter = { ...FALLBACK };
    let pickingCenter = false;
    let downloading = false;
    let online = navigator.onLine;
    let activeRegionId = null;

    const statusEl = document.getElementById("status");
    const modePill = document.getElementById("modePill");
    const modeLabel = document.getElementById("modeLabel");
    const panel = document.getElementById("panel");
    const radiusInput = document.getElementById("radius");
    const radiusVal = document.getElementById("radiusVal");
    const estimateEl = document.getElementById("estimate");
    const progress = document.getElementById("progress");
    const progressBar = document.getElementById("progressBar");
    const regionList = document.getElementById("regionList");
    const popupEl = document.getElementById("popup");
    const popupBody = document.getElementById("popupBody");
    const downloadBtn = document.getElementById("downloadBtn");

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function updateModePill() {
      const offlineCapable = !!activeRegionId && !online;
      modePill.className = "pill " + (offlineCapable ? "offline" : "live");
      modeLabel.textContent = offlineCapable
        ? "Offline local"
        : (activeRegionId ? "Local + network" : "Live tiles");
    }

    function classify(tags) {
      const hw = tags.highway || "";
      if (hw === "path" || hw === "bridleway") return "single";
      if (hw === "track") {
        const tt = tags.tracktype || "";
        if (tt === "grade1" || tt === "grade2") return "g2";
        if (tt === "grade3") return "g3";
        if (tt === "grade4") return "g4";
        if (tt === "grade5") return "g5";
        return "unknown";
      }
      return "unknown";
    }

    function legalAccess(tags) {
      const keys = ["motor_vehicle", "motorcycle", "vehicle", "access"];
      let value = null;
      for (const k of keys) {
        if (tags[k] != null && tags[k] !== "") {
          value = tags[k];
          break;
        }
      }
      if (!value) return { status: "unknown", detail: "use judgment" };
      if (["yes", "permissive", "designated"].includes(value)) return { status: "allowed", detail: value };
      if (["no", "private", "delivery", "agricultural", "forestry"].includes(value)) {
        return { status: "restricted", detail: value };
      }
      return { status: "unknown", detail: value };
    }

    function toFeatures(osm) {
      const out = [];
      for (const el of osm.elements || []) {
        if (el.type !== "way" || !el.geometry || el.geometry.length < 2) continue;
        const tags = el.tags || {};
        const grade = classify(tags);
        const access = legalAccess(tags);
        out.push({
          type: "Feature",
          id: el.id,
          properties: {
            id: el.id,
            grade,
            highway: tags.highway || "",
            tracktype: tags.tracktype || "",
            surface: tags.surface || "",
            name: tags.name || "",
            accessStatus: access.status,
            accessDetail: access.detail
          },
          geometry: {
            type: "LineString",
            coordinates: el.geometry.map((p) => [p.lon, p.lat])
          }
        });
      }
      return out;
    }

    function bboxFromRadius(lng, lat, km) {
      const dLat = km / 111.32;
      const dLng = km / (111.32 * Math.cos((lat * Math.PI) / 180));
      return {
        south: lat - dLat,
        west: lng - dLng,
        north: lat + dLat,
        east: lng + dLng
      };
    }

    function splitBBox(bbox, maxDeg) {
      const cells = [];
      for (let s = bbox.south; s < bbox.north; s += maxDeg) {
        for (let w = bbox.west; w < bbox.east; w += maxDeg) {
          cells.push({
            south: s,
            west: w,
            north: Math.min(s + maxDeg, bbox.north),
            east: Math.min(w + maxDeg, bbox.east)
          });
        }
      }
      return cells;
    }

    function lon2tile(lon, z) {
      return Math.floor(((lon + 180) / 360) * Math.pow(2, z));
    }
    function lat2tile(lat, z) {
      return Math.floor(
        ((1 - Math.log(Math.tan((lat * Math.PI) / 180) + 1 / Math.cos((lat * Math.PI) / 180)) / Math.PI) / 2) *
          Math.pow(2, z)
      );
    }

    function enumerateTiles(bbox, zMin, zMax) {
      const tiles = [];
      for (let z = zMin; z <= zMax; z++) {
        const xMin = lon2tile(bbox.west, z);
        const xMax = lon2tile(bbox.east, z);
        const yMin = lat2tile(bbox.north, z);
        const yMax = lat2tile(bbox.south, z);
        for (let x = xMin; x <= xMax; x++) {
          for (let y = yMin; y <= yMax; y++) {
            tiles.push({ z, x, y });
          }
        }
      }
      return tiles;
    }

    function formatBytes(n) {
      if (n < 1024 * 1024) return Math.round(n / 1024) + " KB";
      return (n / (1024 * 1024)).toFixed(1) + " MB";
    }

    function updateEstimate() {
      const km = Number(radiusInput.value);
      radiusVal.textContent = km + " km";
      const bbox = bboxFromRadius(downloadCenter.lng, downloadCenter.lat, km);
      const tiles = enumerateTiles(bbox, ZOOM_MIN, ZOOM_MAX);
      const requests = tiles.length * TILE_LAYERS;
      const bytes = requests * BYTES_PER_TILE;
      estimateEl.innerHTML =
        "Center " + downloadCenter.lat.toFixed(4) + ", " + downloadCenter.lng.toFixed(4) + "<br>" +
        "Tiles z" + ZOOM_MIN + "-" + ZOOM_MAX + ": ~" + requests.toLocaleString() +
        " (" + tiles.length.toLocaleString() + " xy × 2 layers)<br>" +
        "Est. size: ~" + formatBytes(bytes) + " (plus trail JSON)";
    }

    function tileKey(z, x, y, layer) {
      return z + "/" + x + "/" + y + ":" + layer;
    }

    async function fetchOverpassCell(bbox) {
      const q =
        `[out:json][timeout:60];\n(` +
        `way["highway"="track"](${bbox.south},${bbox.west},${bbox.north},${bbox.east});` +
        `way["highway"="path"]["surface"~"dirt|ground|earth|gravel|unpaved|fine_gravel|compacted|sand|grass"](${bbox.south},${bbox.west},${bbox.north},${bbox.east});` +
        `way["highway"="path"]["motorcycle"](${bbox.south},${bbox.west},${bbox.north},${bbox.east});` +
        `way["highway"="bridleway"](${bbox.south},${bbox.west},${bbox.north},${bbox.east});` +
        `);\nout geom tags;`;

      let lastErr = null;

      // Prefer same-origin proxy when available (mobile Safari often blocks Overpass)
      try {
        const proxy = "/api/overpass?query=" + encodeURIComponent(q);
        const res = await fetch(proxy);
        if (res.ok) return await res.json();
        lastErr = new Error("proxy HTTP " + res.status);
      } catch (err) {
        lastErr = err;
      }

      for (const endpoint of OVERPASS_ENDPOINTS) {
        try {
          const url = endpoint + "?data=" + encodeURIComponent(q);
          const res = await fetch(url, { method: "GET" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          return await res.json();
        } catch (err) {
          lastErr = err;
        }
      }
      throw lastErr || new Error("Overpass failed");
    }

    async function downloadTrails(bbox, onProgress) {
      const cells = splitBBox(bbox, 0.35);
      const byId = new Map();
      for (let i = 0; i < cells.length; i++) {
        const osm = await fetchOverpassCell(cells[i]);
        for (const f of toFeatures(osm)) byId.set(f.id, f);
        onProgress((i + 1) / (cells.length + 1), "Trails " + (i + 1) + "/" + cells.length);
        await new Promise((r) => setTimeout(r, 350));
      }
      return { type: "FeatureCollection", features: [...byId.values()] };
    }

    async function downloadTiles(regionId, bbox, onProgress) {
      const tiles = enumerateTiles(bbox, ZOOM_MIN, ZOOM_MAX);
      const jobs = [];
      for (const t of tiles) {
        jobs.push({ ...t, layer: "base", url: CARTO_BASE.replace("{z}", t.z).replace("{x}", t.x).replace("{y}", t.y) });
        jobs.push({ ...t, layer: "labels", url: CARTO_LABELS.replace("{z}", t.z).replace("{x}", t.x).replace("{y}", t.y) });
      }
      let done = 0;
      let savedBytes = 0;
      for (const job of jobs) {
        const key = tileKey(job.z, job.x, job.y, job.layer);
        const existing = await db.tiles.get(key);
        if (!existing) {
          try {
            const res = await fetch(job.url);
            if (res.ok) {
              const blob = await res.blob();
              try {
                await db.tiles.put({
                  key,
                  regionId,
                  z: job.z,
                  x: job.x,
                  y: job.y,
                  layer: job.layer,
                  blob,
                  bytes: blob.size
                });
                savedBytes += blob.size;
              } catch (err) {
                if (err && (err.name === "QuotaExceededError" || String(err.message || "").includes("Quota"))) {
                  throw new Error("Storage quota exceeded. Delete a region or use a smaller radius.");
                }
                throw err;
              }
            }
          } catch (err) {
            if (err && String(err.message || "").includes("quota")) throw err;
            // skip failed tile; offline will miss it
          }
        } else {
          if (!existing.regionId) await db.tiles.update(key, { regionId });
          savedBytes += existing.bytes || existing.blob?.size || 0;
        }
        done += 1;
        if (done % 8 === 0 || done === jobs.length) {
          onProgress(done / jobs.length, "Tiles " + done + "/" + jobs.length);
        }
        if (done % 40 === 0) await new Promise((r) => setTimeout(r, 20));
      }
      return { tileCount: jobs.length, bytes: savedBytes };
    }

    async function requestPersist() {
      try {
        if (navigator.storage && navigator.storage.persist) {
          await navigator.storage.persist();
        }
      } catch (_) {}
    }

    function setProgress(frac, label) {
      progress.classList.add("on");
      progressBar.style.width = Math.round(frac * 100) + "%";
      if (label) setStatus(label);
    }

    async function runDownload() {
      if (downloading) return;
      downloading = true;
      downloadBtn.disabled = true;
      await requestPersist();

      const km = Number(radiusInput.value);
      const bbox = bboxFromRadius(downloadCenter.lng, downloadCenter.lat, km);
      const tiles = enumerateTiles(bbox, ZOOM_MIN, ZOOM_MAX);
      const requests = tiles.length * TILE_LAYERS;
      const est = requests * BYTES_PER_TILE;
      const ok = confirm(
        "Download this region?\n\n" +
          "~" + requests.toLocaleString() + " tiles (base + labels)\n" +
          "~" + formatBytes(est) + " map data\n" +
          "Radius " + km + " km"
      );
      if (!ok) {
        downloading = false;
        downloadBtn.disabled = false;
        progress.classList.remove("on");
        return;
      }

      const id = "r_" + Date.now();
      try {
        setProgress(0.02, "Downloading trails…");
        const fc = await downloadTrails(bbox, (p, label) => setProgress(p * 0.45, label));
        let trailBytes = 0;
        try {
          const trailJson = JSON.stringify(fc);
          trailBytes = new Blob([trailJson]).size;
          await db.trails.put({ regionId: id, featureCollection: fc, bytes: trailBytes });
        } catch (err) {
          if (err && (err.name === "QuotaExceededError" || String(err.message || "").includes("Quota"))) {
            throw new Error("Storage quota exceeded. Delete a region or use a smaller radius.");
          }
          throw err;
        }

        setProgress(0.5, "Downloading map tiles…");
        const tileResult = await downloadTiles(id, bbox, (p, label) => setProgress(0.5 + p * 0.48, label));

        const region = {
          id,
          name: km + " km around " + downloadCenter.lat.toFixed(3) + ", " + downloadCenter.lng.toFixed(3),
          center: { lng: downloadCenter.lng, lat: downloadCenter.lat },
          radiusKm: km,
          bounds: bbox,
          zoomMin: ZOOM_MIN,
          zoomMax: ZOOM_MAX,
          featureCount: fc.features.length,
          tileCount: tileResult.tileCount,
          bytes: trailBytes + tileResult.bytes,
          createdAt: Date.now()
        };
        await db.regions.put(region);
        activeRegionId = id;
        await renderRegion(id);
        setProgress(1, "Saved " + fc.features.length + " trails · " + formatBytes(region.bytes));
        setStatus(
          "Region saved · " + fc.features.length + " trails · " + formatBytes(region.bytes),
          "ok"
        );
        await refreshRegionList();
        updateModePill();
      } catch (err) {
        console.error(err);
        setStatus("Download failed · " + (err.message || "error"), "error");
        try {
          await db.trails.delete(id);
          await db.tiles.where("regionId").equals(id).delete();
          await db.regions.delete(id);
        } catch (_) {}
      } finally {
        downloading = false;
        downloadBtn.disabled = false;
        setTimeout(() => progress.classList.remove("on"), 800);
      }
    }

    async function renderRegion(regionId) {
      const row = await db.trails.get(regionId);
      const region = await db.regions.get(regionId);
      if (!row || !region) return;
      activeRegionId = regionId;
      const fc = row.featureCollection;
      if (map.getSource("trails")) {
        map.getSource("trails").setData(fc);
      }
      map.fitBounds(
        [
          [region.bounds.west, region.bounds.south],
          [region.bounds.east, region.bounds.north]
        ],
        { padding: 40, duration: 800 }
      );
      updateModePill();
    }

    async function deleteRegion(id) {
      await db.trails.delete(id);
      await db.tiles.where("regionId").equals(id).delete();
      await db.regions.delete(id);
      if (activeRegionId === id) {
        activeRegionId = null;
        if (map.getSource("trails")) {
          map.getSource("trails").setData({ type: "FeatureCollection", features: [] });
        }
      }
      await refreshRegionList();
      updateModePill();
      setStatus("Region deleted");
    }

    async function refreshRegionList() {
      const regions = await db.regions.orderBy("createdAt").reverse().toArray();
      if (!regions.length) {
        regionList.innerHTML = '<div class="meta" style="color:var(--muted);font-family:var(--mono);font-size:0.68rem;margin-top:12px;">No regions downloaded yet.</div>';
        return;
      }
      regionList.innerHTML = regions.map((r) => `
        <div class="region">
          <div>
            <div>${r.name}</div>
            <div class="meta">${r.featureCount} trails · ${r.tileCount} tiles · ${r.bytes ? formatBytes(r.bytes) + " · " : ""}${r.radiusKm} km</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button data-load="${r.id}" type="button">Load</button>
            <button data-del="${r.id}" type="button">Delete</button>
          </div>
        </div>
      `).join("");
      regionList.querySelectorAll("[data-load]").forEach((btn) => {
        btn.addEventListener("click", () => renderRegion(btn.getAttribute("data-load")));
      });
      regionList.querySelectorAll("[data-del]").forEach((btn) => {
        btn.addEventListener("click", () => deleteRegion(btn.getAttribute("data-del")));
      });
      if (!activeRegionId && regions[0]) activeRegionId = regions[0].id;
    }

    // Serve tiles from IndexedDB first; network only when missing and online
    maplibregl.addProtocol("dirt", async (params) => {
      const path = params.url.replace(/^dirt:\/\//, "").split("?")[0];
      const parts = path.split("/");
      const kind = parts[0];
      const z = parts[1];
      const x = parts[2];
      const y = parts[3];
      const key = tileKey(z, x, y, kind === "labels" ? "labels" : "base");
      const hit = await db.tiles.get(key);
      if (hit && hit.blob) {
        return { data: await hit.blob.arrayBuffer() };
      }
      if (!online) {
        const empty = Uint8Array.from(
          atob("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="),
          (c) => c.charCodeAt(0)
        );
        return { data: empty.buffer };
      }
      const template = kind === "labels" ? CARTO_LABELS : CARTO_BASE;
      const url = template.replace("{z}", z).replace("{x}", x).replace("{y}", y);
      const res = await fetch(url);
      if (!res.ok) throw new Error("tile " + res.status);
      return { data: await res.arrayBuffer() };
    });

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          cartoBase: {
            type: "raster",
            tiles: ["dirt://base/{z}/{x}/{y}"],
            tileSize: 256,
            attribution: "&copy; OpenStreetMap &copy; CARTO"
          },
          cartoLabels: {
            type: "raster",
            tiles: ["dirt://labels/{z}/{x}/{y}"],
            tileSize: 256
          }
        },
        layers: [
          { id: "base", type: "raster", source: "cartoBase", paint: { "raster-saturation": -0.1, "raster-brightness-min": 0.05 } },
          { id: "labels", type: "raster", source: "cartoLabels", paint: { "raster-opacity": 0.55 } }
        ]
      },
      center: [FALLBACK.lng, FALLBACK.lat],
      zoom: 11.5,
      attributionControl: false
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "bottom-right");
    map.addControl(new maplibregl.AttributionControl({ compact: true }));

    function ensureLayers() {
      if (map.getSource("trails")) return;
      map.addSource("trails", { type: "geojson", data: { type: "FeatureCollection", features: [] } });
      map.addLayer({
        id: "trails-casing",
        type: "line",
        source: "trails",
        paint: {
          "line-color": "#000000",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 4, 14, 7],
          "line-opacity": 0.75
        }
      });
      map.addLayer({
        id: "trails-line",
        type: "line",
        source: "trails",
        filter: ["!=", ["get", "grade"], "single"],
        paint: {
          "line-color": [
            "match", ["get", "grade"],
            "g2", "#6ee7a8",
            "g3", "#ffd24a",
            "g4", "#ff8a1e",
            "g5", "#ff4d4d",
            "#6b7078"
          ],
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2, 14, 3.5],
          "line-opacity": 0.95
        }
      });
      map.addLayer({
        id: "trails-single",
        type: "line",
        source: "trails",
        filter: ["==", ["get", "grade"], "single"],
        paint: {
          "line-color": "#b98bff",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2, 14, 3],
          "line-dasharray": [1.2, 1.6],
          "line-opacity": 0.95
        }
      });
      map.addSource("rider", {
        type: "geojson",
        data: {
          type: "FeatureCollection",
          features: [{ type: "Feature", geometry: { type: "Point", coordinates: [rider.lng, rider.lat] }, properties: {} }]
        }
      });
      map.addLayer({
        id: "rider-halo",
        type: "circle",
        source: "rider",
        paint: { "circle-radius": 18, "circle-color": "#ff8a1e", "circle-opacity": 0.18, "circle-blur": 0.6 }
      });
      map.addLayer({
        id: "rider-core",
        type: "circle",
        source: "rider",
        paint: {
          "circle-radius": 7,
          "circle-color": "#ff8a1e",
          "circle-stroke-width": 2,
          "circle-stroke-color": "#0b0c0e"
        }
      });
    }

    function setRider(lng, lat) {
      rider = { lng, lat };
      downloadCenter = { lng, lat };
      updateEstimate();
      if (map.getSource("rider")) {
        map.getSource("rider").setData({
          type: "FeatureCollection",
          features: [{ type: "Feature", geometry: { type: "Point", coordinates: [lng, lat] }, properties: {} }]
        });
      }
    }

    function hidePopup() { popupEl.classList.remove("visible"); }

    function showPopup(feature, point) {
      const p = feature.properties;
      const color = GRADE_COLOR[p.grade] || GRADE_COLOR.unknown;
      popupBody.innerHTML =
        '<div class="k">Type</div><div class="v">' + (p.highway || "unspecified") + (p.name ? " · " + p.name : "") + "</div>" +
        '<div class="k">Grade</div><div class="v" style="color:' + color + '">' + (p.grade || "unknown") + (p.tracktype ? " · " + p.tracktype : "") + "</div>" +
        '<div class="k">Surface</div><div class="v">' + (p.surface || "unspecified") + "</div>" +
        '<div class="k">Motor access</div><div class="v">' + (p.accessStatus || "unknown") + (p.accessDetail ? " · " + p.accessDetail : "") + "</div>";
      const pad = 12;
      const w = Math.min(300, window.innerWidth - 24);
      let left = point.x - w / 2;
      left = Math.max(pad, Math.min(left, window.innerWidth - w - pad));
      let top = point.y - 160;
      if (top < pad + 70) top = point.y + 18;
      popupEl.style.left = left + "px";
      popupEl.style.top = top + "px";
      popupEl.classList.add("visible");
    }

    map.on("load", async () => {
      ensureLayers();
      await refreshRegionList();
      const regions = await db.regions.orderBy("createdAt").reverse().toArray();
      if (regions[0]) {
        await renderRegion(regions[0].id);
        setStatus("Loaded local region · " + regions[0].featureCount + " trails", "ok");
      } else {
        setStatus("No local region · download to go offline");
      }
      updateModePill();
      updateEstimate();

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setRider(pos.coords.longitude, pos.coords.latitude);
            map.flyTo({ center: [rider.lng, rider.lat], zoom: 11.5 });
          },
          () => setRider(FALLBACK.lng, FALLBACK.lat),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    });

    map.on("click", (e) => {
      if (pickingCenter) {
        downloadCenter = { lng: e.lngLat.lng, lat: e.lngLat.lat };
        pickingCenter = false;
        setStatus("Center set · " + downloadCenter.lat.toFixed(4) + ", " + downloadCenter.lng.toFixed(4));
        updateEstimate();
        return;
      }
      const hits = map.queryRenderedFeatures(e.point, { layers: ["trails-line", "trails-single"] });
      if (!hits.length) { hidePopup(); return; }
      showPopup(hits[0], e.point);
    });

    document.getElementById("popupClose").addEventListener("click", hidePopup);
    document.getElementById("panelBtn").addEventListener("click", () => panel.classList.toggle("hidden"));
    document.getElementById("refreshBtn").addEventListener("click", async () => {
      if (!activeRegionId) {
        setStatus("No local region loaded");
        return;
      }
      await renderRegion(activeRegionId);
      setStatus("Reloaded from local storage", "ok");
    });
    document.getElementById("recenterBtn").addEventListener("click", () => {
      map.flyTo({ center: [rider.lng, rider.lat], zoom: Math.max(map.getZoom(), 11.5) });
    });
    document.getElementById("useGpsBtn").addEventListener("click", () => {
      if (!navigator.geolocation) {
        setStatus("GPS unavailable", "error");
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          setRider(pos.coords.longitude, pos.coords.latitude);
          map.flyTo({ center: [rider.lng, rider.lat], zoom: 11.5 });
          setStatus("GPS locked as download center", "ok");
        },
        () => setStatus("GPS denied", "error")
      );
    });
    document.getElementById("pickCenterBtn").addEventListener("click", () => {
      pickingCenter = true;
      setStatus("Tap the map to set download center");
    });
    downloadBtn.addEventListener("click", runDownload);
    radiusInput.addEventListener("input", updateEstimate);

    window.addEventListener("online", () => { online = true; updateModePill(); setStatus("Back online"); });
    window.addEventListener("offline", () => { online = false; updateModePill(); setStatus("Offline · using local data", "ok"); });
  </script>
</body>
</html>
