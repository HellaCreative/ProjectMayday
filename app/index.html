<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f9fb" />
  <title>DIRT. Map</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f7f9fb'/%3E%3Cpath d='M12 42h40' stroke='%230a66c2' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M16 24h32' stroke='%23162433' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>
  <style>
    :root {
      --bg: #f7f9fb;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-2: #eef3f7;
      --line: rgba(24, 39, 55, 0.18);
      --text: #162433;
      --muted: #536170;
      --accent: #0a66c2;
      --g2: #008a56;
      --g3: #b96f00;
      --g4: #d84400;
      --g5: #c1122f;
      --single: #6d36c9;
      --unknown: #5d6874;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    #map { position: absolute; inset: 0; }

    .topbar {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      pointer-events: auto;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(12px);
    }
    .brand span { color: var(--accent); }

    .pill {
      pointer-events: auto;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      color: var(--muted);
      text-align: right;
    }
    .pill strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-top: 2px;
    }
    .pill.ready { border-color: rgba(0, 138, 86, 0.42); }
    .pill.ready strong { color: var(--g2); }

    .status {
      position: absolute;
      top: calc(max(12px, env(safe-area-inset-top)) + 64px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      white-space: nowrap;
      max-width: calc(100vw - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status.ok { color: var(--g2); }
    .status.error { color: var(--g5); border-color: rgba(193, 18, 47, 0.35); }

    .stack {
      position: absolute;
      right: 12px;
      bottom: max(176px, calc(env(safe-area-inset-bottom) + 164px));
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
    .btn:active { transform: scale(0.96); }

    .panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(12px, calc(env(safe-area-inset-bottom) + 12px));
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(14px);
      max-height: min(48vh, 360px);
      overflow: auto;
    }
    .panel.hidden { display: none; }
    .panel h2 {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .panel p {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
      margin-bottom: 12px;
    }
    .meta {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.5;
      padding: 10px 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .legend {
      position: absolute;
      left: 12px;
      top: calc(max(12px, env(safe-area-inset-top)) + 118px);
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .legend div { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .legend div:last-child { margin-bottom: 0; }
    .legend i { width: 18px; height: 3px; border-radius: 2px; display: block; }
    .legend i.dash {
      background: repeating-linear-gradient(90deg, var(--single) 0 4px, transparent 4px 7px);
      height: 2px;
    }

    .popup {
      position: absolute;
      z-index: 30;
      width: min(300px, calc(100vw - 24px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(14px);
      display: none;
    }
    .popup.visible { display: block; }
    .popup .k {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .popup .v { font-size: 0.95rem; margin-bottom: 10px; }
    .popup .v:last-child { margin-bottom: 0; }
    .popup .close {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px; border: 0; background: transparent;
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
    }

    .maplibregl-ctrl-bottom-right {
      right: 12px !important;
      bottom: max(12px, env(safe-area-inset-bottom)) !important;
      display: flex !important;
      flex-direction: column-reverse !important;
      align-items: flex-end !important;
      gap: 10px !important;
    }
    .maplibregl-ctrl-bottom-right .maplibregl-ctrl { margin: 0 !important; }
    .maplibregl-ctrl-group {
      background: var(--panel) !important;
      border: 1px solid var(--line) !important;
      border-radius: 16px !important;
      overflow: hidden;
      box-shadow: none !important;
    }
    .maplibregl-ctrl-group button {
      width: 52px !important;
      height: 52px !important;
      background-color: transparent !important;
    }
    .maplibregl-ctrl-attrib {
      background: var(--panel) !important;
      color: var(--muted) !important;
      border: 1px solid var(--line) !important;
      border-radius: 12px !important;
      font-family: var(--mono) !important;
      font-size: 0.62rem !important;
    }
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) {
      width: 28px !important;
      height: 28px !important;
      padding: 0 !important;
    }
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) .maplibregl-ctrl-attrib-inner {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <a class="brand" href="../index.html">DIRT<span>.</span></a>
    <div class="pill" id="modePill">Trails<strong id="modeLabel">Loading…</strong></div>
  </div>

  <div class="status" id="status">Loading bundled NS trails…</div>

  <div class="legend">
    <div><i style="background:var(--g2)"></i>G2 solid</div>
    <div><i style="background:var(--g3)"></i>G3 mixed</div>
    <div><i style="background:var(--g4)"></i>G4 rough</div>
    <div><i style="background:var(--g5)"></i>G5 sparse</div>
    <div><i class="dash"></i>Single</div>
    <div><i style="background:var(--unknown)"></i>Unknown</div>
  </div>

  <div class="stack">
    <button class="btn" id="panelBtn" title="Data info" aria-label="Data info">ℹ</button>
    <button class="btn primary" id="recenterBtn" title="Recenter" aria-label="Recenter">◎</button>
  </div>

  <div class="panel hidden" id="panel">
    <h2>Bundled trail data</h2>
    <p>
      Nova Scotia dirt tracks are compiled into this build from OpenStreetMap
      (Geofabrik extract). No Overpass call. No scan-on-pan. The app already has the trails.
    </p>
    <div class="meta" id="dataMeta">Loading metadata…</div>
  </div>

  <div class="popup" id="popup">
    <button class="close" id="popupClose" aria-label="Close">×</button>
    <div id="popupBody"></div>
  </div>

  <script>
    const FALLBACK = { lng: -63.2985, lat: 44.7427, name: "Porter's Lake, NS" };
    const BUNDLED_TRAILS_URL = "/app/data/ns-trails.geojson.gz";
    const BUNDLED_META_URL = "/app/data/ns-trails.meta.json";
    const CARTO_BASE = "https://a.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}@2x.png";
    const CARTO_LABELS = "https://a.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}@2x.png";

    const GRADE_COLOR = {
      g2: "#008a56",
      g3: "#b96f00",
      g4: "#d84400",
      g5: "#c1122f",
      single: "#6d36c9",
      unknown: "#5d6874"
    };

    const db = new Dexie("dirt_bundled_v1");
    db.version(1).stores({
      bundled: "id"
    });

    let rider = { ...FALLBACK };
    let trailCount = 0;

    const statusEl = document.getElementById("status");
    const modePill = document.getElementById("modePill");
    const modeLabel = document.getElementById("modeLabel");
    const panel = document.getElementById("panel");
    const dataMeta = document.getElementById("dataMeta");
    const popupEl = document.getElementById("popup");
    const popupBody = document.getElementById("popupBody");

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function setReady(count) {
      trailCount = count;
      modePill.className = "pill ready";
      modeLabel.textContent = count.toLocaleString() + " bundled";
    }

    async function fetchGzipJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);
      if (typeof DecompressionStream === "undefined") {
        throw new Error("Gzip decompress not supported in this browser");
      }
      const stream = res.body.pipeThrough(new DecompressionStream("gzip"));
      const text = await new Response(stream).text();
      return JSON.parse(text);
    }

    async function loadBundledTrails() {
      const cached = await db.bundled.get("ns-trails");
      if (cached && cached.featureCollection && cached.featureCollection.features) {
        setStatus("Loaded " + cached.featureCollection.features.length.toLocaleString() + " trails from device cache", "ok");
        return cached.featureCollection;
      }

      setStatus("Loading bundled NS trails…");
      const fc = await fetchGzipJson(BUNDLED_TRAILS_URL);
      try {
        await db.bundled.put({
          id: "ns-trails",
          featureCollection: fc,
          cachedAt: Date.now()
        });
      } catch (err) {
        console.warn("Could not cache trails in IndexedDB", err);
      }
      return fc;
    }

    async function loadMeta() {
      try {
        const meta = await (await fetch(BUNDLED_META_URL)).json();
        dataMeta.innerHTML =
          "Features: " + (meta.featureCount || 0).toLocaleString() + "<br>" +
          "Pack size: ~" + ((meta.gzBytes || 0) / (1024 * 1024)).toFixed(1) + " MB gzipped<br>" +
          "Built: " + (meta.generatedAt ? new Date(meta.generatedAt).toLocaleString() : "unknown") + "<br>" +
          "Source: Geofabrik Nova Scotia OSM";
      } catch (_) {
        dataMeta.textContent = "Metadata unavailable";
      }
    }

    maplibregl.addProtocol("carto", async (params) => {
      const path = params.url.replace(/^carto:\/\//, "").split("?")[0];
      const [kind, z, x, y] = path.split("/");
      const template = kind === "labels" ? CARTO_LABELS : CARTO_BASE;
      const url = template.replace("{z}", z).replace("{x}", x).replace("{y}", y);
      const res = await fetch(url);
      if (!res.ok) throw new Error("tile " + res.status);
      return { data: await res.arrayBuffer() };
    });

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          cartoBase: {
            type: "raster",
            tiles: ["carto://base/{z}/{x}/{y}"],
            tileSize: 256,
            attribution: "&copy; OpenStreetMap &copy; CARTO"
          },
          cartoLabels: {
            type: "raster",
            tiles: ["carto://labels/{z}/{x}/{y}"],
            tileSize: 256
          }
        },
        layers: [
          { id: "base", type: "raster", source: "cartoBase" },
          { id: "labels", type: "raster", source: "cartoLabels", paint: { "raster-opacity": 0.55 } }
        ]
      },
      center: [FALLBACK.lng, FALLBACK.lat],
      zoom: 11.5,
      attributionControl: false
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "bottom-right");
    map.addControl(new maplibregl.AttributionControl({ compact: true }), "bottom-right");

    function collapseAttribution() {
      const el = document.querySelector(".maplibregl-ctrl-attrib");
      if (el) el.classList.remove("maplibregl-compact-show");
    }

    function ensureLayers() {
      if (map.getSource("trails")) return;
      map.addSource("trails", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] }
      });
      map.addLayer({
        id: "trails-casing",
        type: "line",
        source: "trails",
        paint: {
          "line-color": "#000000",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 4.5, 14, 8],
          "line-opacity": 0.78
        }
      });
      map.addLayer({
        id: "trails-line",
        type: "line",
        source: "trails",
        filter: ["!=", ["get", "grade"], "single"],
        paint: {
          "line-color": [
            "match", ["get", "grade"],
            "g2", "#008a56",
            "g3", "#b96f00",
            "g4", "#d84400",
            "g5", "#c1122f",
            "#5d6874"
          ],
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2.6, 14, 4.2],
          "line-opacity": 0.98
        }
      });
      map.addLayer({
        id: "trails-single",
        type: "line",
        source: "trails",
        filter: ["==", ["get", "grade"], "single"],
        paint: {
          "line-color": "#6d36c9",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2.8, 14, 4],
          "line-dasharray": [1.2, 1.6],
          "line-opacity": 0.95
        }
      });
      map.addSource("rider", {
        type: "geojson",
        data: {
          type: "FeatureCollection",
          features: [{
            type: "Feature",
            geometry: { type: "Point", coordinates: [rider.lng, rider.lat] },
            properties: {}
          }]
        }
      });
      map.addLayer({
        id: "rider-halo",
        type: "circle",
        source: "rider",
        paint: {
          "circle-radius": 18,
          "circle-color": "#0a66c2",
          "circle-opacity": 0.2,
          "circle-blur": 0.6
        }
      });
      map.addLayer({
        id: "rider-core",
        type: "circle",
        source: "rider",
        paint: {
          "circle-radius": 7,
          "circle-color": "#0a66c2",
          "circle-stroke-width": 2,
          "circle-stroke-color": "#ffffff"
        }
      });
    }

    function setRider(lng, lat) {
      rider = { lng, lat };
      if (map.getSource("rider")) {
        map.getSource("rider").setData({
          type: "FeatureCollection",
          features: [{
            type: "Feature",
            geometry: { type: "Point", coordinates: [lng, lat] },
            properties: {}
          }]
        });
      }
    }

    function hidePopup() { popupEl.classList.remove("visible"); }

    function showPopup(feature, point) {
      const p = feature.properties || {};
      const color = GRADE_COLOR[p.grade] || GRADE_COLOR.unknown;
      popupBody.innerHTML =
        '<div class="k">Type</div><div class="v">' + (p.highway || "unspecified") + (p.name ? " · " + p.name : "") + "</div>" +
        '<div class="k">Grade</div><div class="v" style="color:' + color + '">' + (p.grade || "unknown") + (p.tracktype ? " · " + p.tracktype : "") + "</div>" +
        '<div class="k">Surface</div><div class="v">' + (p.surface || "unspecified") + "</div>" +
        '<div class="k">Motor access</div><div class="v">' + (p.accessStatus || "unknown") + (p.accessDetail ? " · " + p.accessDetail : "") + "</div>" +
        '<div class="k">Source</div><div class="v">Bundled OSM (Geofabrik NS)</div>';
      const pad = 12;
      const w = Math.min(300, window.innerWidth - 24);
      let left = point.x - w / 2;
      left = Math.max(pad, Math.min(left, window.innerWidth - w - pad));
      let top = point.y - 180;
      if (top < pad + 70) top = point.y + 18;
      popupEl.style.left = left + "px";
      popupEl.style.top = top + "px";
      popupEl.classList.add("visible");
    }

    map.on("load", async () => {
      ensureLayers();
      collapseAttribution();
      loadMeta();

      try {
        const t0 = performance.now();
        const fc = await loadBundledTrails();
        map.getSource("trails").setData(fc);
        const ms = Math.round(performance.now() - t0);
        setReady(fc.features.length);
        setStatus(
          fc.features.length.toLocaleString() + " NS trails ready · " + ms + " ms",
          "ok"
        );
      } catch (err) {
        console.error(err);
        setStatus("Failed to load bundled trails · " + (err.message || "error"), "error");
        modeLabel.textContent = "Load failed";
      }

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setRider(pos.coords.longitude, pos.coords.latitude);
            map.flyTo({ center: [rider.lng, rider.lat], zoom: 11.5 });
          },
          () => setRider(FALLBACK.lng, FALLBACK.lat),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    });

    map.once("idle", collapseAttribution);

    map.on("click", (e) => {
      const hits = map.queryRenderedFeatures(e.point, {
        layers: ["trails-line", "trails-single"]
      });
      if (!hits.length) {
        hidePopup();
        return;
      }
      showPopup(hits[0], e.point);
    });

    document.getElementById("popupClose").addEventListener("click", hidePopup);
    document.getElementById("panelBtn").addEventListener("click", () => {
      panel.classList.toggle("hidden");
    });
    document.getElementById("recenterBtn").addEventListener("click", () => {
      map.flyTo({ center: [rider.lng, rider.lat], zoom: Math.max(map.getZoom(), 11.5) });
    });
  </script>
</body>
</html>
