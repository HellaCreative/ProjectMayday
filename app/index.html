<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f9fb" />
  <title>DIRT. Map</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f7f9fb'/%3E%3Cpath d='M12 42h40' stroke='%230a66c2' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M16 24h32' stroke='%23162433' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>
  <style>
    :root {
      --bg: #f7f9fb;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-2: #eef3f7;
      --line: rgba(24, 39, 55, 0.18);
      --text: #162433;
      --muted: #536170;
      --accent: #0a66c2;
      --access: #0a66c2;
      --gravel: #5d6874;
      --track: #7c3aed;
      --bridge: #00876c;
      --tunnel: #8b5e34;
      --unserviced: #d22730;
      --single: #6d36c9;
      --route: #ffb000;
      --route-dark: #111820;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    #map { position: absolute; inset: 0; }

    .topbar {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      pointer-events: auto;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(12px);
    }
    .brand span { color: var(--accent); }

    .pill {
      pointer-events: auto;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      color: var(--muted);
      text-align: right;
    }
    .pill strong {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      margin-top: 2px;
    }
    .pill.ready { border-color: rgba(10, 102, 194, 0.42); }
    .pill.ready strong { color: var(--accent); }

    .status {
      position: absolute;
      top: calc(max(12px, env(safe-area-inset-top)) + 64px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      white-space: nowrap;
      max-width: calc(100vw - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status.ok { color: var(--accent); }
    .status.error { color: #c1122f; border-color: rgba(193, 18, 47, 0.35); }

    .stack {
      position: absolute;
      right: 12px;
      bottom: max(176px, calc(env(safe-area-inset-bottom) + 164px));
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
    .btn:active { transform: scale(0.96); }

    .panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(12px, calc(env(safe-area-inset-bottom) + 12px));
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(14px);
      max-height: min(48vh, 360px);
      overflow: auto;
    }
    .panel.hidden { display: none; }
    .panel h2 {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .panel p {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
      margin-bottom: 12px;
    }
    .meta {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.5;
      padding: 10px 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .legend {
      position: absolute;
      left: 12px;
      top: calc(max(12px, env(safe-area-inset-top)) + 118px);
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(12px);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 160px;
    }
    .legend-group + .legend-group {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .legend-title {
      display: block;
      margin-bottom: 7px;
      color: var(--text);
      font-size: 0.62rem;
    }
    .legend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 24px;
      margin-bottom: 5px;
    }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-label { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .legend i { width: 18px; height: 2px; border-radius: 2px; display: block; flex: 0 0 auto; }
    .legend i.dash {
      background: repeating-linear-gradient(90deg, var(--single) 0 4px, transparent 4px 7px);
      height: 2px;
    }
    .switch {
      position: relative;
      display: inline-flex;
      width: 34px;
      height: 18px;
      flex: 0 0 auto;
    }
    .switch input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
    }
    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(93, 104, 116, 0.3);
      border: 1px solid rgba(24, 39, 55, 0.22);
      transition: background 140ms ease;
    }
    .switch span::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.22);
      transition: transform 140ms ease;
    }
    .switch input:checked + span { background: var(--accent); border-color: transparent; }
    .switch input:checked + span::after { transform: translateX(16px); }
    .switch input:focus-visible + span {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .route-card {
      position: absolute;
      top: calc(max(12px, env(safe-area-inset-top)) + 88px);
      right: 12px;
      z-index: 20;
      width: min(312px, calc(100vw - 24px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      backdrop-filter: blur(12px);
      color: var(--text);
    }
    .route-segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 3px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    .route-mode {
      border: 0;
      border-radius: 8px;
      min-height: 34px;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .route-mode.active {
      background: var(--route-dark);
      color: #ffffff;
    }
    .route-readout {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .route-status {
      min-width: 0;
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.35;
    }
    .route-status strong {
      display: block;
      color: var(--text);
      font-size: 0.82rem;
      margin-top: 2px;
    }
    .route-clear {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .route-clear:disabled {
      opacity: 0.38;
      cursor: default;
    }

    .popup {
      position: absolute;
      z-index: 30;
      width: min(300px, calc(100vw - 24px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(14px);
      display: none;
    }
    .popup.visible { display: block; }
    .popup .k {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .popup .v { font-size: 0.95rem; margin-bottom: 10px; }
    .popup .v:last-child { margin-bottom: 0; }
    .popup .close {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px; border: 0; background: transparent;
      color: var(--muted); font-size: 1.1rem; cursor: pointer;
    }

    .maplibregl-ctrl-bottom-right {
      right: 12px !important;
      bottom: max(12px, env(safe-area-inset-bottom)) !important;
      display: flex !important;
      flex-direction: column-reverse !important;
      align-items: flex-end !important;
      gap: 10px !important;
    }
    .maplibregl-ctrl-bottom-right .maplibregl-ctrl { margin: 0 !important; }
    .maplibregl-ctrl-group {
      background: var(--panel) !important;
      border: 1px solid var(--line) !important;
      border-radius: 16px !important;
      overflow: hidden;
      box-shadow: none !important;
    }
    .maplibregl-ctrl-group button {
      width: 52px !important;
      height: 52px !important;
      background-color: transparent !important;
    }
    .maplibregl-ctrl-attrib {
      background: var(--panel) !important;
      color: var(--muted) !important;
      border: 1px solid var(--line) !important;
      border-radius: 12px !important;
      font-family: var(--mono) !important;
      font-size: 0.62rem !important;
    }
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) {
      width: 28px !important;
      height: 28px !important;
      padding: 0 !important;
    }
    .maplibregl-ctrl-attrib.maplibregl-compact:not(.maplibregl-compact-show) .maplibregl-ctrl-attrib-inner {
      display: none !important;
    }

    @media (max-width: 760px) {
      .route-card {
        top: calc(max(12px, env(safe-area-inset-top)) + 92px);
        left: 12px;
        right: 12px;
        width: auto;
      }
      .legend {
        top: calc(max(12px, env(safe-area-inset-top)) + 214px);
        max-height: calc(100vh - 330px);
        overflow: auto;
      }
      .status {
        top: calc(max(12px, env(safe-area-inset-top)) + 58px);
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <a class="brand" href="../index.html">DIRT<span>.</span></a>
    <div class="pill" id="modePill">NSTDB<strong id="modeLabel">Loading…</strong></div>
  </div>

  <div class="status" id="status">Loading NS government roads…</div>

  <div class="route-card" id="routeCard">
    <div class="route-segment" role="tablist" aria-label="Routing mode">
      <button class="route-mode active" type="button" data-route-mode="here" role="tab" aria-selected="true">From here</button>
      <button class="route-mode" type="button" data-route-mode="plan" role="tab" aria-selected="false">Plan route</button>
    </div>
    <div class="route-readout">
      <div class="route-status" id="routeStatus">Tap destination<strong>No route set</strong></div>
      <button class="route-clear" id="routeClear" type="button" title="Clear route" aria-label="Clear route" disabled>×</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-group">
      <span class="legend-title">Track type</span>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--access)"></i>Access road</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="access" checked aria-label="Toggle access roads"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--gravel)"></i>Gravel road</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="gravel" checked aria-label="Toggle gravel roads"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--track)"></i>Track</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="track" checked aria-label="Toggle tracks"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--bridge)"></i>Bridge</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="bridge" checked aria-label="Toggle bridges"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--tunnel)"></i>Tunnel</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="tunnel" checked aria-label="Toggle tunnels"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--unserviced)"></i>Unserviced</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="unserviced" checked aria-label="Toggle unserviced roads"><span></span></span>
      </label>
      <label class="legend-row">
        <span class="legend-label"><i class="dash"></i>Single track</span>
        <span class="switch"><input type="checkbox" data-layer-toggle="single" checked aria-label="Toggle single track"><span></span></span>
      </label>
    </div>
    <div class="legend-group">
      <span class="legend-title">Data sources</span>
      <!-- OSM Overpass source disabled for NSTDB-only POC.
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--text)"></i>OSM Overpass</span>
        <span class="switch"><input type="checkbox" data-source-toggle="osm" checked aria-label="Toggle OSM Overpass source"><span></span></span>
      </label>
      -->
      <!-- NRN gravel source disabled for NSTDB-only POC.
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--text)"></i>NRN gravel</span>
        <span class="switch"><input type="checkbox" data-source-toggle="nrn" aria-label="Toggle National Road Network gravel source"><span></span></span>
      </label>
      -->
      <label class="legend-row">
        <span class="legend-label"><i style="background:var(--text)"></i>NS government</span>
        <span class="switch"><input type="checkbox" data-source-toggle="nsGov" checked aria-label="Toggle Nova Scotia government source"><span></span></span>
      </label>
    </div>
  </div>

  <div class="stack">
    <button class="btn" id="panelBtn" title="Data info" aria-label="Data info">ℹ</button>
    <button class="btn primary" id="recenterBtn" title="Recenter" aria-label="Recenter">◎</button>
  </div>

  <div class="panel hidden" id="panel">
    <h2>Bundled data sources</h2>
    <p>
      Nova Scotia government NSTDB roads are compiled into this build. OSM
      Overpass and NRN are retained in the repo but disabled for this POC.
    </p>
    <div class="meta" id="dataMeta">Loading metadata…</div>
  </div>

  <div class="popup" id="popup">
    <button class="close" id="popupClose" aria-label="Close">×</button>
    <div id="popupBody"></div>
  </div>

  <script>
    const FALLBACK = { lng: -63.2985, lat: 44.7427, name: "Porter's Lake, NS" };
    // OSM Overpass disabled for NSTDB-only POC.
    // const BUNDLED_TRAILS_URL = "/app/data/osm-overpass-trails.geojson.gz";
    // const BUNDLED_META_URL = "/app/data/osm-overpass-trails.meta.json";
    // NRN gravel disabled for NSTDB-only POC.
    // const BUNDLED_NRN_URL = "/app/data/nrn-road-backbone.geojson.gz";
    // const BUNDLED_NRN_META_URL = "/app/data/nrn-road-backbone.meta.json";
    const BUNDLED_NS_GOV_URL = "/app/data/ns-gov-roads.geojson.gz";
    const BUNDLED_NS_GOV_META_URL = "/app/data/ns-gov-roads.meta.json";
    const SHORTBREAD_STYLE_URL = "/app/data/shortbread-style.json";

    const TRACK_TYPES = {
      access: { label: "Access road", color: "#0a66c2", layers: ["ns-gov-access"] },
      gravel: { label: "Gravel road", color: "#5d6874", layers: ["ns-gov-gravel"] },
      track: { label: "Track", color: "#7c3aed", layers: ["ns-gov-track"] },
      bridge: { label: "Bridge", color: "#00876c", layers: ["ns-gov-bridge"] },
      tunnel: { label: "Tunnel", color: "#8b5e34", layers: ["ns-gov-tunnel"] },
      unserviced: { label: "Unserviced", color: "#d22730", layers: ["ns-gov-unserviced"] },
      single: { label: "Single track", color: "#6d36c9", layers: ["ns-gov-single"] }
    };
    const TRAIL_LAYER_IDS = Object.values(TRACK_TYPES).flatMap((type) => type.layers);
    // const OSM_LAYER_IDS = ["trails-gravel", "trails-atv", "trails-single"];
    // const NRN_LAYER_IDS = ["nrn-gravel"];
    const NS_GOV_LAYER_IDS = Object.values(TRACK_TYPES).flatMap((type) => type.layers);
    const SOURCE_LAYER_MAP = { nsGov: NS_GOV_LAYER_IDS };
    const layerEnabled = { access: true, gravel: true, track: true, bridge: true, tunnel: true, unserviced: true, single: true };
    const sourceEnabled = { nsGov: true };

    const db = new Dexie("dirt_sources_v4");
    db.version(1).stores({
      bundled: "id"
    });

    let rider = { ...FALLBACK };
    let trailCount = 0;
    let nsGovLoaded = false;
    let routeMode = "here";
    let plannedStart = null;
    let destination = null;
    let nsGovFeatureCollection = null;
    let routingGraph = null;
    let routingGraphPromise = null;
    let activeRoute = null;
    let routeMessage = "";
    let routeJobId = 0;
    const sourceCounts = { nsGov: 0 };

    const statusEl = document.getElementById("status");
    const modePill = document.getElementById("modePill");
    const modeLabel = document.getElementById("modeLabel");
    const panel = document.getElementById("panel");
    const dataMeta = document.getElementById("dataMeta");
    const popupEl = document.getElementById("popup");
    const popupBody = document.getElementById("popupBody");
    const routeStatus = document.getElementById("routeStatus");
    const routeClear = document.getElementById("routeClear");

    function classifyTrack(feature) {
      const p = feature.properties || {};
      if (p.trackClass) return p.trackClass;
      return "gravel";
    }

    function addTrackTypes(fc) {
      return {
        ...fc,
        features: (fc.features || []).map((feature) => ({
          ...feature,
          properties: {
            ...(feature.properties || {}),
            trackClass: classifyTrack(feature)
          }
        }))
      };
    }

    function applyLayerVisibility() {
      if (!map || !map.isStyleLoaded()) return;
      for (const [key, config] of Object.entries(TRACK_TYPES)) {
        for (const layerId of config.layers) {
          const sourceVisible = Object.entries(SOURCE_LAYER_MAP).some(([source, layerIds]) => {
            return layerIds.includes(layerId) && sourceEnabled[source];
          });
          const visible = layerEnabled[key] && sourceVisible ? "visible" : "none";
          if (map.getLayer(layerId)) map.setLayoutProperty(layerId, "visibility", visible);
        }
      }
    }

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function setReady(count) {
      trailCount = count;
      modePill.className = "pill ready";
      modeLabel.textContent = count.toLocaleString() + " bundled";
    }

    function setReadyTotal() {
      setReady(Object.values(sourceCounts).reduce((sum, count) => sum + count, 0));
    }

    async function fetchGzipJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);
      if (typeof DecompressionStream === "undefined") {
        throw new Error("Gzip decompress not supported in this browser");
      }
      const stream = res.body.pipeThrough(new DecompressionStream("gzip"));
      const text = await new Response(stream).text();
      return JSON.parse(text);
    }

    // OSM Overpass and NRN loaders disabled for NSTDB-only POC.

    async function loadBundledNsGov() {
      const cached = await db.bundled.get("ns-gov-roads");
      if (cached && cached.featureCollection && cached.featureCollection.features) {
        setStatus("Loaded " + cached.featureCollection.features.length.toLocaleString() + " NS government roads from device cache", "ok");
        return cached.featureCollection;
      }

      setStatus("Loading NS government roads…");
      const fc = await fetchGzipJson(BUNDLED_NS_GOV_URL);
      try {
        await db.bundled.put({
          id: "ns-gov-roads",
          featureCollection: fc,
          cachedAt: Date.now()
        });
      } catch (err) {
        console.warn("Could not cache NS government roads in IndexedDB", err);
      }
      return fc;
    }

    // NRN loading disabled for NSTDB-only POC.

    async function ensureNsGovLoaded() {
      if (nsGovLoaded) return;

    function tuneShortbreadContrast() {
      const layers = map.getStyle().layers || [];
      for (const layer of layers) {

        if (layer.type === "fill") {
          if (id.includes("water")) {
            map.setPaintProperty(id, "fill-color", "#8fc7d8");
          } else if (id.includes("forest")) {
            map.setPaintProperty(id, "fill-color", "#9fbe89");
          } else if (id.includes("park") || id.includes("recreation") || id.includes("grass")) {
            map.setPaintProperty(id, "fill-color", "#b8d795");
            map.setPaintProperty(id, "fill-opacity", 0.78);
          } else if (id.includes("residential")) {
            map.setPaintProperty(id, "fill-color", "#d2d5d8");
          } else if (id.includes("farmland") || id.includes("farmyard")) {
            map.setPaintProperty(id, "fill-color", "#ead7bb");
          }
        }

        if (layer.type === "line") {
          if (id.includes("motorway")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#496682" : "#78a6d8");
          } else if (id.includes("trunk") || id.includes("primary")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#8b4a4a" : "#e08b8b");
          } else if (id.includes("secondary")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#9a6a30" : "#f2b35f");
          } else if (id.includes("tertiary")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#8d8128" : "#f4df63");
          } else if (id.includes("unclassified") || id.includes("service") || id.includes("living_street")) {
            map.setPaintProperty(id, "line-color", id.includes("casing") ? "#6f7478" : "#ffffff");
          } else if (id.includes("track") || id.includes("path") || id.includes("bridleway")) {

    function setRider(lng, lat) {
      rider = { lng, lat };
      if (map.getSource("rider")) {
        map.getSource("rider").setData({
          type: "FeatureCollection",

    function pointFromLngLat(lngLat) {
      return { lng: lngLat.lng, lat: lngLat.lat };
    }

    function activeStart() {
      return routeMode === "here" ? rider : plannedStart;
    }

    function routeFeatureCollection() {
      const start = activeStart();
      const features = [];
      if (activeRoute) {
        features.push({
          type: "Feature",
          geometry: {
            type: "LineString",
            coordinates: activeRoute.coordinates
          },
          properties: { role: "route" }
        });
      } else if (start && destination) {
        features.push({
          type: "Feature",
          geometry: {
            type: "LineString",
            coordinates: [[start.lng, start.lat], [destination.lng, destination.lat]]
          },
          properties: { role: "direct" }
        });
      }
      if (start && (destination || routeMode === "plan")) {
        features.push({
          type: "Feature",
          geometry: { type: "Point", coordinates: [start.lng, start.lat] },
          properties: { role: "start", label: "A" }
        });
      }
      if (destination) {
        features.push({
          type: "Feature",
          geometry: { type: "Point", coordinates: [destination.lng, destination.lat] },
          properties: { role: "destination", label: "B" }
        });
      }
      return { type: "FeatureCollection", features };
    }

    function haversineKm(a, b) {
      if (!a || !b) return 0;
      const toRad = (deg) => deg * Math.PI / 180;
      const r = 6371;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * r * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
    }

    function distanceKmCoords(a, b) {
      return haversineKm({ lng: a[0], lat: a[1] }, { lng: b[0], lat: b[1] });
    }

    function lineLengthKm(coords) {
      let total = 0;
      for (let i = 1; i < coords.length; i += 1) {
        total += distanceKmCoords(coords[i - 1], coords[i]);
      }
      return total;
    }

    function routeWeight(trackClass, distanceKm) {
      const multipliers = {
        track: 0.72,
        access: 0.78,
        gravel: 0.86,
        bridge: 0.9,
        tunnel: 0.92,
        single: 1.05,
        unserviced: 1.55
      };
      return distanceKm * (multipliers[trackClass] || 1);
    }

    function nodeKey(coord) {
      return coord[0].toFixed(5) + "," + coord[1].toFixed(5);
    }

    function yieldToBrowser() {
      return new Promise((resolve) => setTimeout(resolve, 0));
    }

    async function ensureRoutingGraph() {
      if (routingGraph) return routingGraph;
      if (routingGraphPromise) return routingGraphPromise;
      routingGraphPromise = buildRoutingGraph();
      routingGraph = await routingGraphPromise;
      return routingGraph;
    }

    async function buildRoutingGraph() {
      if (!nsGovFeatureCollection) {
        await ensureNsGovLoaded();
      }
      const graph = {
        nodeLookup: new Map(),
        nodes: [],
        adjacency: [],
        edges: []
      };

      function addNode(coord) {
        const key = nodeKey(coord);
        const existing = graph.nodeLookup.get(key);
        if (existing != null) return existing;
        const id = graph.nodes.length;
        graph.nodeLookup.set(key, id);
        graph.nodes.push([Number(coord[0]), Number(coord[1])]);
        graph.adjacency.push([]);
        return id;
      }

      const features = nsGovFeatureCollection.features || [];
      for (let featureIndex = 0; featureIndex < features.length; featureIndex += 1) {
        const feature = features[featureIndex];
        const geometry = feature.geometry;
        const parts = geometry.type === "MultiLineString" ? geometry.coordinates : [geometry.coordinates];
        for (const coords of parts) {
          if (!coords || coords.length < 2) continue;
          const a = addNode(coords[0]);
          const b = addNode(coords[coords.length - 1]);
          if (a === b) continue;
          const trackClass = feature.properties?.trackClass || "gravel";
          const measuredKm = Number(feature.properties?.lengthMeters) > 0
            ? Number(feature.properties.lengthMeters) / 1000
            : lineLengthKm(coords);
          const distanceKm = Math.max(measuredKm, 0.001);
          const edgeIndex = graph.edges.length;
          const edge = {
            a,
            b,
            coords,
            trackClass,
            distanceKm,
            weight: routeWeight(trackClass, distanceKm)
          };
          graph.edges.push(edge);
          graph.adjacency[a].push({ to: b, edgeIndex, weight: edge.weight });
          graph.adjacency[b].push({ to: a, edgeIndex, weight: edge.weight });
        }
        if (featureIndex > 0 && featureIndex % 2500 === 0) {
          routeMessage = "Building route graph<strong>" + featureIndex.toLocaleString() + " / " + features.length.toLocaleString() + "</strong>";
          refreshRouteDraft();
          await yieldToBrowser();
        }
      }
      return graph;
    }

    class MinHeap {
      constructor() { this.items = []; }
      push(item) {
        this.items.push(item);
        this.bubbleUp(this.items.length - 1);
      }
      pop() {
        if (!this.items.length) return null;
        const top = this.items[0];
        const end = this.items.pop();
        if (this.items.length) {
          this.items[0] = end;
          this.sinkDown(0);
        }
        return top;
      }
      bubbleUp(index) {
        while (index > 0) {
          const parent = Math.floor((index - 1) / 2);
          if (this.items[parent].cost <= this.items[index].cost) break;
          [this.items[parent], this.items[index]] = [this.items[index], this.items[parent]];
          index = parent;
        }
      }
      sinkDown(index) {
        for (;;) {
          const left = index * 2 + 1;
          const right = left + 1;
          let smallest = index;
          if (left < this.items.length && this.items[left].cost < this.items[smallest].cost) smallest = left;
          if (right < this.items.length && this.items[right].cost < this.items[smallest].cost) smallest = right;
          if (smallest === index) break;
          [this.items[smallest], this.items[index]] = [this.items[index], this.items[smallest]];
          index = smallest;
        }
      }
    }

    function nearestGraphNode(graph, point) {
      const cosLat = Math.cos(point.lat * Math.PI / 180);
      let bestNode = -1;
      let bestScore = Infinity;
      for (let i = 0; i < graph.nodes.length; i += 1) {
        const node = graph.nodes[i];
        const dx = (node[0] - point.lng) * cosLat;
        const dy = node[1] - point.lat;
        const score = dx * dx + dy * dy;
        if (score < bestScore) {
          bestScore = score;
          bestNode = i;
        }
      }
      return bestNode;
    }

    function findNetworkRoute(graph, start, end) {
      const startNode = nearestGraphNode(graph, start);
      const endNode = nearestGraphNode(graph, end);
      if (startNode < 0 || endNode < 0 || startNode === endNode) return null;

      const distances = new Float64Array(graph.nodes.length);
      distances.fill(Infinity);
      const previousNode = new Int32Array(graph.nodes.length);
      previousNode.fill(-1);
      const previousEdge = new Int32Array(graph.nodes.length);
      previousEdge.fill(-1);
      const heap = new MinHeap();
      distances[startNode] = 0;
      heap.push({ node: startNode, cost: 0 });

      while (heap.items.length) {
        const current = heap.pop();
        if (!current || current.cost !== distances[current.node]) continue;
        if (current.node === endNode) break;
        for (const next of graph.adjacency[current.node]) {
          const cost = current.cost + next.weight;
          if (cost < distances[next.to]) {
            distances[next.to] = cost;
            previousNode[next.to] = current.node;
            previousEdge[next.to] = next.edgeIndex;
            heap.push({ node: next.to, cost });
          }
        }
      }

      if (!Number.isFinite(distances[endNode])) return null;
      const edgeIndexes = [];
      for (let node = endNode; node !== startNode;) {
        const edgeIndex = previousEdge[node];
        if (edgeIndex < 0) return null;
        edgeIndexes.push(edgeIndex);
        node = previousNode[node];
      }
      edgeIndexes.reverse();

      const coordinates = [[start.lng, start.lat]];
      let cursor = startNode;
      let distanceKm = 0;
      let dirtKm = 0;
      const byClass = {};
      for (const edgeIndex of edgeIndexes) {
        const edge = graph.edges[edgeIndex];
        const forward = edge.a === cursor;
        const edgeCoords = forward ? edge.coords : [...edge.coords].reverse();
        for (let i = 0; i < edgeCoords.length; i += 1) {
          const coord = edgeCoords[i];
          const last = coordinates[coordinates.length - 1];
          if (last && last[0] === coord[0] && last[1] === coord[1]) continue;
          coordinates.push(coord);
        }
        cursor = forward ? edge.b : edge.a;
        distanceKm += edge.distanceKm;
        dirtKm += edge.distanceKm;
        byClass[edge.trackClass] = (byClass[edge.trackClass] || 0) + edge.distanceKm;
      }
      coordinates.push([end.lng, end.lat]);
      return { kind: "nstdb", coordinates, distanceKm, dirtKm, byClass };
    }

    async function fetchRoadConnectorRoute(start, end) {
      const coords = start.lng + "," + start.lat + ";" + end.lng + "," + end.lat;
      const url = "https://router.project-osrm.org/route/v1/driving/" + coords + "?overview=full&geometries=geojson&steps=false";
      const res = await fetch(url);
      if (!res.ok) throw new Error("OSM road connector HTTP " + res.status);
      const json = await res.json();
      const route = json.routes && json.routes[0];
      if (!route || !route.geometry || !route.geometry.coordinates) {
        throw new Error("No OSM road connector route");
      }
      return {
        kind: "roadConnector",
        coordinates: route.geometry.coordinates,
        distanceKm: route.distance / 1000,
        dirtKm: 0,
        byClass: { connector: route.distance / 1000 }
      };
    }

    function updateRouteStatus() {
      const start = activeStart();
      routeClear.disabled = !plannedStart && !destination;
      if (routeMessage) {
        routeStatus.innerHTML = routeMessage;
        return;
      }
      if (activeRoute) {
        if (activeRoute.kind === "roadConnector") {
          routeStatus.innerHTML =
            "Road route beta<strong>" +
            activeRoute.distanceKm.toFixed(activeRoute.distanceKm >= 10 ? 1 : 2) +
            " km · OSM connector</strong>";
          return;
        }
        const dirtPct = activeRoute.distanceKm ? Math.round((activeRoute.dirtKm / activeRoute.distanceKm) * 100) : 0;
        routeStatus.innerHTML =
          "Network route<strong>" +
          activeRoute.distanceKm.toFixed(activeRoute.distanceKm >= 10 ? 1 : 2) +
          " km · " + dirtPct + "% dirt</strong>";
        return;
      }
      if (start && destination) {
        const km = haversineKm(start, destination);
        routeStatus.innerHTML = "Direct only<strong>" + km.toFixed(km >= 10 ? 1 : 2) + " km as the crow flies</strong>";
        return;
      }
      if (routeMode === "here") {
        routeStatus.innerHTML = "Tap destination<strong>From current location</strong>";
        return;
      }
      if (!plannedStart) {
        routeStatus.innerHTML = "Tap start<strong>Point A needed</strong>";
        return;
      }
      routeStatus.innerHTML = "Tap destination<strong>Point B needed</strong>";
    }

    function refreshRouteDraft() {
      if (map.getSource("routeDraft")) {
        map.getSource("routeDraft").setData(routeFeatureCollection());
      }
      updateRouteStatus();
    }

    function clearRoute() {
      routeJobId += 1;
      plannedStart = null;
      destination = null;
      activeRoute = null;
      routeMessage = "";
      hidePopup();
      refreshRouteDraft();
    }

    function setRouteMode(nextMode) {
      routeJobId += 1;
      routeMode = nextMode;
      plannedStart = null;
      destination = null;
      activeRoute = null;
      routeMessage = "";
      document.querySelectorAll("[data-route-mode]").forEach((button) => {
        const active = button.dataset.routeMode === routeMode;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
      });
      refreshRouteDraft();
    }

    async function calculateRoute() {
      const start = activeStart();
      if (!start || !destination) {
        activeRoute = null;
        routeMessage = "";
        refreshRouteDraft();
        return;
      }
      const jobId = ++routeJobId;
      activeRoute = null;
      routeMessage = "Routing<strong>Using OSM road connector</strong>";
      refreshRouteDraft();
      try {
        const roadRoute = await fetchRoadConnectorRoute(start, destination);
        if (jobId !== routeJobId) return;
        activeRoute = roadRoute;
        routeMessage = "";
        refreshRouteDraft();
      } catch (roadErr) {
        console.warn("OSM road connector failed; trying NSTDB graph", roadErr);
        if (jobId !== routeJobId) return;
        routeMessage = "Building route graph<strong>Trying NSTDB fallback</strong>";
        refreshRouteDraft();
        try {
          const graph = await ensureRoutingGraph();
          if (jobId !== routeJobId) return;
          routeMessage = "Routing<strong>Snapping to NSTDB network</strong>";
          refreshRouteDraft();
          const route = findNetworkRoute(graph, start, destination);
          if (jobId !== routeJobId) return;
          if (!route) {
            routeMessage = "No connected route<strong>Showing direct line only</strong>";
            activeRoute = null;
            refreshRouteDraft();
            return;
          }
          activeRoute = route;
          routeMessage = "";
          refreshRouteDraft();
        } catch (err) {
          console.error(err);
          if (jobId !== routeJobId) return;
          routeMessage = "Routing failed<strong>" + (err.message || "Try again") + "</strong>";
          activeRoute = null;
          refreshRouteDraft();
        }
      }
    }

    function handleRouteClick(e) {
      hidePopup();
      const clicked = pointFromLngLat(e.lngLat);
      if (routeMode === "here") {
        destination = clicked;
        calculateRoute();
        return;
      }
      if (!plannedStart) {
        plannedStart = clicked;
        destination = null;
        activeRoute = null;
        routeMessage = "";
        refreshRouteDraft();
        return;
      }
      destination = clicked;
      calculateRoute();
    }

    function hidePopup() { popupEl.classList.remove("visible"); }

    function showPopup(feature, point) {
      const p = feature.properties || {};
      const trackType = TRACK_TYPES[p.trackClass] || TRACK_TYPES.gravel;
      const sourceLabel = "Nova Scotia government NSTDB";
      const typeLabel = p.roadClass || "NSTDB road";
      const detailLabel = (p.featCode || "NSTDB") + (p.surfaceConfidence ? " · " + p.surfaceConfidence : "");
      const surfaceLabel = p.surfaceConfidence === "nstdb-unpaved" ? "unpaved" : "NSTDB category";
      const accessLabel = (p.accessStatus || "unknown") + (p.accessDetail ? " · " + p.accessDetail : "");
      popupBody.innerHTML =
        '<div class="k">Type</div><div class="v">' + typeLabel + (p.name ? " · " + p.name : "") + "</div>" +
        '<div class="k">Track class</div><div class="v" style="color:' + trackType.color + '">' + trackType.label + "</div>" +
        '<div class="k">Detail</div><div class="v">' + detailLabel + "</div>" +
        '<div class="k">Surface</div><div class="v">' + surfaceLabel + "</div>" +
        '<div class="k">Access / jurisdiction</div><div class="v">' + accessLabel + "</div>" +
        '<div class="k">Source</div><div class="v">' + sourceLabel + "</div>";
      const pad = 12;
      const w = Math.min(300, window.innerWidth - 24);
      let left = point.x - w / 2;
      left = Math.max(pad, Math.min(left, window.innerWidth - w - pad));
      let top = point.y - 180;
      if (top < pad + 70) top = point.y + 18;
      popupEl.style.left = left + "px";
      popupEl.style.top = top + "px";
      popupEl.classList.add("visible");
    }

    map.on("load", async () => {
      tuneShortbreadContrast();
      ensureLayers();
      collapseAttribution();
      loadMeta();

      try {
        const t0 = performance.now();
        await ensureNsGovLoaded();
        const ms = Math.round(performance.now() - t0);
        setStatus(
          sourceCounts.nsGov.toLocaleString() + " NS government roads ready · " + ms + " ms",
          "ok"
        );
      } catch (err) {
        console.error(err);
        setStatus("Failed to load NS government roads · " + (err.message || "error"), "error");
        modeLabel.textContent = "Load failed";
      }

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setRider(pos.coords.longitude, pos.coords.latitude);
            map.flyTo({ center: [rider.lng, rider.lat], zoom: 11.5 });
          },
          () => setRider(FALLBACK.lng, FALLBACK.lat),
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }
    });

    map.once("idle", collapseAttribution);

    map.on("click", handleRouteClick);

    document.getElementById("popupClose").addEventListener("click", hidePopup);
    routeClear.addEventListener("click", clearRoute);
    document.querySelectorAll("[data-route-mode]").forEach((button) => {
      button.addEventListener("click", () => setRouteMode(button.dataset.routeMode));
    });
    document.getElementById("panelBtn").addEventListener("click", () => {
      panel.classList.toggle("hidden");
    });
    document.getElementById("recenterBtn").addEventListener("click", () => {
      map.flyTo({ center: [rider.lng, rider.lat], zoom: Math.max(map.getZoom(), 11.5) });
    });
    document.querySelectorAll("[data-layer-toggle]").forEach((input) => {
      input.addEventListener("change", () => {
        layerEnabled[input.dataset.layerToggle] = input.checked;
        applyLayerVisibility();
      });
    });
    document.querySelectorAll("[data-source-toggle]").forEach((input) => {
      input.addEventListener("change", async () => {
        sourceEnabled[input.dataset.sourceToggle] = input.checked;
        if (input.dataset.sourceToggle === "nsGov" && input.checked) {
          try {
            await ensureNsGovLoaded();
          } catch (err) {
            console.error(err);
            setStatus("Failed to load NS government roads · " + (err.message || "error"), "error");
            input.checked = false;
            sourceEnabled.nsGov = false;
          }
        }
        applyLayerVisibility();
      });
    });
  </script>
</body>
</html>
