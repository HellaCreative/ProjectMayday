<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0e" />
  <title>DIRT. Map</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --bg: #0b0c0e;
      --panel: #141619;
      --panel-2: #1b1e22;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2f0eb;
      --muted: #8b8f96;
      --amber: #ff8a1e;
      --g2: #6ee7a8;
      --g3: #ffd24a;
      --g4: #ff8a1e;
      --g5: #ff4d4d;
      --single: #b98bff;
      --unknown: #6b7078;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
    #map { position: absolute; inset: 0; }

    .topbar {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 5;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      pointer-events: auto;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      text-decoration: none;
      color: var(--text);
      background: rgba(11, 12, 14, 0.72);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
    }

    .brand span { color: var(--amber); }

    .stat {
      pointer-events: auto;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(11, 12, 14, 0.72);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--muted);
      text-align: right;
      min-width: 120px;
    }

    .stat strong {
      display: block;
      color: var(--text);
      font-size: 1.05rem;
      letter-spacing: 0.02em;
      margin-top: 2px;
    }

    .status {
      position: absolute;
      top: calc(max(12px, env(safe-area-inset-top)) + 58px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(11, 12, 14, 0.8);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      white-space: nowrap;
      max-width: calc(100vw - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.25s ease;
    }

    .status.error { color: #ff8a8a; border-color: rgba(255, 77, 77, 0.35); }
    .status.ok { color: var(--g2); }

    .filters {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(18px, calc(env(safe-area-inset-bottom) + 12px));
      z-index: 5;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 52px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(20, 22, 25, 0.92);
      backdrop-filter: blur(12px);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .chip.on {
      opacity: 1;
      border-color: color-mix(in srgb, var(--chip, var(--amber)) 55%, transparent);
    }

    .chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--chip);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--chip) 25%, transparent);
    }

    .chip .count {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .stack {
      position: absolute;
      right: 12px;
      bottom: max(88px, calc(env(safe-area-inset-bottom) + 80px));
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(20, 22, 25, 0.92);
      backdrop-filter: blur(12px);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .btn.amber {
      background: var(--amber);
      border-color: transparent;
      color: #111;
    }

    .btn:active { transform: scale(0.96); }

    .maplibregl-ctrl-bottom-right {
      right: 12px !important;
      bottom: max(150px, calc(env(safe-area-inset-bottom) + 142px)) !important;
    }

    .maplibregl-ctrl-group {
      background: rgba(20, 22, 25, 0.92) !important;
      border: 1px solid var(--line) !important;
      border-radius: 16px !important;
      overflow: hidden;
      box-shadow: none !important;
    }

    .maplibregl-ctrl-group button {
      width: 42px !important;
      height: 42px !important;
      background-color: transparent !important;
    }

    .maplibregl-ctrl-group button + button {
      border-top: 1px solid var(--line) !important;
    }

    .maplibregl-ctrl button.maplibregl-ctrl-zoom-in .maplibregl-ctrl-icon,
    .maplibregl-ctrl button.maplibregl-ctrl-zoom-out .maplibregl-ctrl-icon {
      filter: invert(1) brightness(1.2);
    }

    .popup {
      position: absolute;
      z-index: 6;
      width: min(300px, calc(100vw - 24px));
      background: rgba(20, 22, 25, 0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 14px 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      display: none;
    }

    .popup.visible { display: block; }

    .popup .k {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .popup .v {
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .popup .v:last-child { margin-bottom: 0; }

    .popup .grade {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .popup .grade i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--g);
    }

    .popup .close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <a class="brand" href="../index.html">DIRT<span>.</span></a>
    <div class="stat">In view<strong id="totalCount">0</strong></div>
  </div>

  <div class="status" id="status">Locating rider…</div>

  <div class="stack">
    <button class="btn" id="refreshBtn" title="Refresh trails" aria-label="Refresh trails">↻</button>
    <button class="btn amber" id="recenterBtn" title="Recenter on me" aria-label="Recenter on me">◎</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="popup" id="popup">
    <button class="close" id="popupClose" aria-label="Close">×</button>
    <div id="popupBody"></div>
  </div>

  <script>
    const FALLBACK = { lng: -63.2985, lat: 44.7427, name: "Porter's Lake, NS" };
    const MIN_ZOOM = 10;
    const DEBOUNCE_MS = 900;
    const OVERPASS_ENDPOINTS = [
      "https://overpass-api.de/api/interpreter",
      "https://overpass.kumi.systems/api/interpreter",
      "https://maps.mail.ru/osm/tools/overpass/api/interpreter"
    ];

    const ROAD_TYPES = [
      { id: "highway", label: "Major Roads", color: "#1e40af", width: 4 },
      { id: "dirt", label: "Dirt Roads", color: "#92400e", width: 3 },
      { id: "service", label: "Service/Forestry", color: "#15803d", width: 2.5 },
      { id: "trail", label: "Trails", color: "#7c3aed", width: 2, dash: [2, 2] }
    ];

    const GRADES = [
      { id: "g2", label: "G2 solid", color: "#00a86b" },
      { id: "g3", label: "G3 mixed", color: "#f0a000" },
      { id: "g4", label: "G4 rough", color: "#e85d04" },
      { id: "g5", label: "G5 sparse", color: "#c1121f" },
      { id: "single", label: "Single", color: "#7c3aed" },
      { id: "unknown", label: "Ungraded", color: "#4a5568" }
    ];

    const gradeOn = Object.fromEntries(GRADES.map((g) => [g.id, true]));
    const roadTypeOn = Object.fromEntries(ROAD_TYPES.map((r) => [r.id, true]));
    let rider = { ...FALLBACK };
    let features = [];
    let settling = false;
    let debounceTimer = null;
    let fetchToken = 0;
    
    // Data cache: store fetched areas to avoid re-scanning
    const dataCache = new Map(); // key: "south,west,north,east", value: features array
    
    function getCacheKey(bbox) {
      return bbox.map(n => n.toFixed(3)).join(',');
    }
    
    function isCached(bbox) {
      const key = getCacheKey(bbox);
      return dataCache.has(key);
    }
    
    function getCached(bbox) {
      const key = getCacheKey(bbox);
      return dataCache.get(key) || [];
    }
    
    function setCache(bbox, features) {
      const key = getCacheKey(bbox);
      dataCache.set(key, features);
      // Keep cache size reasonable - remove oldest if > 50 entries
      if (dataCache.size > 50) {
        const firstKey = dataCache.keys().next().value;
        dataCache.delete(firstKey);
      }
    }

    const statusEl = document.getElementById("status");
    const totalEl = document.getElementById("totalCount");
    const filtersEl = document.getElementById("filters");
    const popupEl = document.getElementById("popup");
    const popupBody = document.getElementById("popupBody");

    function setStatus(text, kind = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function classifyRoadType(tags) {
      const hw = tags.highway || "";
      const surface = tags.surface || "";
      
      // Major roads: paved highways and primary roads
      if (["motorway", "trunk", "primary", "secondary", "tertiary"].includes(hw)) {
        return "highway";
      }
      
      // Trails: paths, bridleways, singletrack
      if (["path", "bridleway", "footway", "cycleway"].includes(hw)) {
        return "trail";
      }
      
      // Service/Forestry: service roads, resource roads
      if (hw === "service" || hw === "track" && (tags.tracktype === "grade1" || tags.tracktype === "grade2")) {
        return "service";
      }
      
      // Dirt roads: tracks, unclassified unpaved
      if (hw === "track" || (hw === "unclassified" && surface.match(/unpaved|gravel|dirt|ground/i))) {
        return "dirt";
      }
      
      // Default to dirt for unknown
      return "dirt";
    }

    function classify(tags) {
      const hw = tags.highway || "";
      const surface = tags.surface || "";
      
      // Major roads get good grade
      if (["motorway", "trunk", "primary", "secondary", "tertiary", "unclassified"].includes(hw)) {
        if (surface.match(/paved|asphalt|concrete/i) || !surface) {
          return "g2"; // Paved roads = solid
        }
        return "g3"; // Unpaved major roads = mixed
      }
      
      // Paths and trails
      if (hw === "path" || hw === "bridleway") return "single";
      
      // Tracks by grade
      if (hw === "track") {
        const tt = tags.tracktype || "";
        if (tt === "grade1" || tt === "grade2") return "g2";
        if (tt === "grade3") return "g3";
        if (tt === "grade4") return "g4";
        if (tt === "grade5") return "g5";
        return "g3"; // Default for tracks without grade
      }
      
      // Service roads
      if (hw === "service") return "g3";
      
      return "g3"; // Default to mixed
    }

    function legalAccess(tags) {
      const keys = ["motor_vehicle", "motorcycle", "vehicle", "access"];
      let value = null;
      for (const k of keys) {
        if (tags[k] != null && tags[k] !== "") {
          value = tags[k];
          break;
        }
      }
      if (!value) return { status: "unknown", detail: "use judgment" };
      const allowed = ["yes", "permissive", "designated"];
      const restricted = ["no", "private", "delivery", "agricultural", "forestry"];
      if (allowed.includes(value)) return { status: "allowed", detail: value };
      if (restricted.includes(value)) return { status: "restricted", detail: value };
      return { status: "unknown", detail: value };
    }

    function gradeLabel(id) {
      return GRADES.find((g) => g.id === id)?.label || id;
    }

    function buildFilters() {
      filtersEl.innerHTML = "";
      for (const g of GRADES) {
        const btn = document.createElement("button");
        btn.className = "chip on";
        btn.style.setProperty("--chip", g.color);
        btn.dataset.grade = g.id;
        btn.innerHTML = `<span class="dot"></span><span>${g.label}</span><span class="count" data-count="${g.id}">0</span>`;
        btn.addEventListener("click", () => {
          gradeOn[g.id] = !gradeOn[g.id];
          btn.classList.toggle("on", gradeOn[g.id]);
          applyFilters();
        });
        filtersEl.appendChild(btn);
      }
    }

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          cartoVoyager: {
            type: "raster",
            tiles: [
              "https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png",
              "https://b.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png",
              "https://c.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png"
            ],
            tileSize: 256,
            attribution: "&copy; OpenStreetMap &copy; CARTO"
          }
        },
        layers: [
          {
            id: "carto-light",
            type: "raster",
            source: "cartoVoyager"
          }
        ]
      },
      center: [FALLBACK.lng, FALLBACK.lat],
      zoom: 11.5,
      attributionControl: false
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "bottom-right");
    map.addControl(new maplibregl.AttributionControl({ compact: true }));

    function ensureLayers() {
      if (map.getSource("trails")) return;

      map.addSource("trails", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] }
      });

      map.addLayer({
        id: "trails-casing",
        type: "line",
        source: "trails",
        paint: {
          "line-color": "#ffffff",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 5, 14, 8],
          "line-opacity": 0.9
        }
      });

      map.addLayer({
        id: "trails-line",
        type: "line",
        source: "trails",
        filter: ["!=", ["get", "grade"], "single"],
        paint: {
          "line-color": [
            "match", ["get", "grade"],
            "g2", "#00a86b",
            "g3", "#f0a000",
            "g4", "#e85d04",
            "g5", "#c1121f",
            "#4a5568"
          ],
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 3, 14, 5],
          "line-opacity": 1
        }
      });

      map.addLayer({
        id: "trails-single",
        type: "line",
        source: "trails",
        filter: ["==", ["get", "grade"], "single"],
        paint: {
          "line-color": "#7c3aed",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2.5, 14, 4],
          "line-dasharray": [2, 2],
          "line-opacity": 1
        }
      });

      map.addSource("rider", {
        type: "geojson",
        data: pointFC(rider.lng, rider.lat)
      });

      map.addLayer({
        id: "rider-halo",
        type: "circle",
        source: "rider",
        paint: {
          "circle-radius": 18,
          "circle-color": "#ff8a1e",
          "circle-opacity": 0.18,
          "circle-blur": 0.6
        }
      });

      map.addLayer({
        id: "rider-core",
        type: "circle",
        source: "rider",
        paint: {
          "circle-radius": 7,
          "circle-color": "#ff8a1e",
          "circle-stroke-width": 2,
          "circle-stroke-color": "#0b0c0e"
        }
      });
    }

    function pointFC(lng, lat) {
      return {
        type: "FeatureCollection",
        features: [{
          type: "Feature",
          geometry: { type: "Point", coordinates: [lng, lat] },
          properties: {}
        }]
      };
    }

    function setRider(lng, lat) {
      rider = { lng, lat };
      if (map.getSource("rider")) {
        map.getSource("rider").setData(pointFC(lng, lat));
      }
    }

    // Layer 1: Major roads (fast)
    function queryMajorRoads(bbox) {
      const [south, west, north, east] = bbox;
      return `[out:json][timeout:15];
(
  way["highway"~"motorway|trunk|primary|secondary|tertiary"](${south},${west},${north},${east});
  way["highway"="unclassified"](${south},${west},${north},${east});
);
out geom tags;`;
    }
    
    // Layer 2: Service & forestry roads (medium)
    function queryServiceRoads(bbox) {
      const [south, west, north, east] = bbox;
      return `[out:json][timeout:15];
(
  way["highway"="track"](${south},${west},${north},${east});
  way["highway"="service"](${south},${west},${north},${east});
);
out geom tags;`;
    }
    
    // Layer 3: Trails (slower)
    function queryTrails(bbox) {
      const [south, west, north, east] = bbox;
      return `[out:json][timeout:15];
(
  way["highway"="path"](${south},${west},${north},${east});
  way["highway"="bridleway"](${south},${west},${north},${east});
  way["highway"]["motor_vehicle"="no"]["bicycle"="yes"](${south},${west},${north},${east});
  way["route"="mtb"](${south},${west},${north},${east});
);
out geom tags;`;
    }

    function currentBBox() {
      const b = map.getBounds();
      return [
        b.getSouth(),
        b.getWest(),
        b.getNorth(),
        b.getEast()
      ].map((n) => Number(n.toFixed(5)));
    }

    async function fetchOverpassLayer(bbox, queryFn) {
      const q = queryFn(bbox);
      try {
        const url = "/api/overpass?query=" + encodeURIComponent(q);
        const res = await fetch(url, { method: "GET" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      } catch (err) {
        throw err || new Error("Overpass proxy failed");
      }
    }

    function toFeatures(osm) {
      const out = [];
      for (const el of osm.elements || []) {
        if (el.type !== "way" || !el.geometry || el.geometry.length < 2) continue;
        const tags = el.tags || {};
        const grade = classify(tags);
        const roadType = classifyRoadType(tags);
        const access = legalAccess(tags);
        out.push({
          type: "Feature",
          id: el.id,
          properties: {
            id: el.id,
            grade,
            roadType,
            highway: tags.highway || "",
            tracktype: tags.tracktype || "",
            surface: tags.surface || "",
            name: tags.name || "",
            accessStatus: access.status,
            accessDetail: access.detail
          },
          geometry: {
            type: "LineString",
            coordinates: el.geometry.map((p) => [p.lon, p.lat])
          }
        });
      }
      return out;
    }

    function applyFilters() {
      const visible = features.filter((f) => {
        const props = f.properties;
        return gradeOn[props.grade] && roadTypeOn[props.roadType || 'dirt'];
      });
      if (map.getSource("trails")) {
        map.getSource("trails").setData({ type: "FeatureCollection", features: visible });
      }
      totalEl.textContent = String(visible.length);
      const counts = Object.fromEntries(GRADES.map((g) => [g.id, 0]));
      for (const f of features) counts[f.properties.grade] = (counts[f.properties.grade] || 0) + 1;
      for (const g of GRADES) {
        const el = filtersEl.querySelector(`[data-count="${g.id}"]`);
        if (el) el.textContent = String(counts[g.id] || 0);
      }
    }

    async function scanTrails(reason = "scan") {
      if (map.getZoom() < MIN_ZOOM) {
        setStatus("Zoom in to scan trails");
        features = [];
        applyFilters();
        return;
      }

      const token = ++fetchToken;
      const bbox = currentBBox();
      
      // Check cache first
      if (isCached(bbox)) {
        features = getCached(bbox);
        applyFilters();
        setStatus(
          features.length ? `${features.length} segments (cached) · ${reason}` : "No tracks in view",
          features.length ? "ok" : ""
        );
        return;
      }
      
      try {
        // Fetch ONLY off-road data (basemap has roads already!)
        setStatus("Scanning trails…");
        
        const [osmResult, nsResult] = await Promise.allSettled([
          fetchOverpassLayer(bbox, queryOffRoadOnly),
          fetchNSTrails(bbox)
        ]);
        
        if (token !== fetchToken) return;
        
        let allFeatures = [];
        
        // Process OSM off-road data
        if (osmResult.status === 'fulfilled') {
          allFeatures = toFeatures(osmResult.value);
        }
        
        // Process NS data
        if (nsResult.status === 'fulfilled' && nsResult.value.features) {
          const nsFeatures = nsResult.value.features.map(f => ({
            ...f,
            properties: {
              ...f.properties,
              id: f.id || 'ns-' + Math.random(),
              grade: classifyNSTrail(f.properties),
              roadType: classifyNSTrail(f.properties) === 'single' ? 'trail' : 'dirt',
              highway: f.properties.road_class || 'trail',
              source: 'ns-open-data'
            }
          }));
          allFeatures = [...allFeatures, ...nsFeatures];
        }
        
        features = allFeatures;
        setCache(bbox, features);
        applyFilters();
        setStatus(
          features.length ? `${features.length} segments · ${reason}` : "No tracks in view",
          features.length ? "ok" : ""
        );
      } catch (err) {
        if (token !== fetchToken) return;
        console.error(err);
        setStatus("Scan failed · " + (err.message || "fetch error"), "error");
      }
    }
    
    async function fetchNSTrails(bbox) {
      const bboxStr = bbox.join(',');
      const url = `/api/ns-trails?bbox=${bboxStr}&limit=2000`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    }
    
    function classifyNSTrail(props) {
      const fcode = (props.fcode || '').toLowerCase();
      const roadClass = (props.road_class || '').toLowerCase();
      const surface = (props.surface || '').toLowerCase();
      
      // Classify NS trails into our grade system
      if (fcode.includes('trail') || roadClass.includes('trail')) {
        return 'single';
      }
      if (surface.includes('paved') || surface.includes('asphalt')) {
        return 'g2'; // Well-maintained
      }
      if (surface.includes('gravel')) {
        return 'g3';
      }
      if (surface.includes('dirt') || surface.includes('earth')) {
        return 'g4';
      }
      if (fcode.includes('resource') || roadClass.includes('resource')) {
        return 'g4'; // Resource roads typically rough
      }
      return 'unknown';
    }

    function scheduleScan(reason) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        if (settling) return;
        scanTrails(reason);
      }, DEBOUNCE_MS);
    }

    function hidePopup() {
      popupEl.classList.remove("visible");
    }

    function showPopup(feature, point) {
      const p = feature.properties;
      const g = GRADES.find((x) => x.id === p.grade);
      popupBody.innerHTML = `
        <div class="k">Type</div>
        <div class="v">${p.highway || "—"}${p.name ? " · " + p.name : ""}</div>
        <div class="k">Grade</div>
        <div class="v"><span class="grade" style="--g:${g?.color || "#6b7078"}"><i></i>${gradeLabel(p.grade)}${p.tracktype ? " · " + p.tracktype : ""}</span></div>
        <div class="k">Surface</div>
        <div class="v">${p.surface || "unspecified"}</div>
        <div class="k">Motor access</div>
        <div class="v">${p.accessStatus}${p.accessDetail ? " · " + p.accessDetail : ""}</div>
      `;
      const pad = 12;
      const w = Math.min(300, window.innerWidth - 24);
      let left = point.x - w / 2;
      left = Math.max(pad, Math.min(left, window.innerWidth - w - pad));
      let top = point.y - 170;
      if (top < pad + 70) top = point.y + 18;
      popupEl.style.left = left + "px";
      popupEl.style.top = top + "px";
      popupEl.classList.add("visible");
    }

    function flyToRider() {
      settling = true;
      hidePopup();
      map.flyTo({
        center: [rider.lng, rider.lat],
        zoom: Math.max(map.getZoom(), 12),
        essential: true,
        duration: 1200
      });
      map.once("moveend", () => {
        settling = false;
        scanTrails("recenter");
      });
    }

    function locateRider() {
      setStatus("Locating rider…");
      if (!navigator.geolocation) {
        setRider(FALLBACK.lng, FALLBACK.lat);
        setStatus("GPS unavailable · " + FALLBACK.name);
        flyToRider();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          setRider(pos.coords.longitude, pos.coords.latitude);
          setStatus("Rider locked");
          flyToRider();
        },
        () => {
          setRider(FALLBACK.lng, FALLBACK.lat);
          setStatus("GPS denied · starting at " + FALLBACK.name);
          flyToRider();
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 10000 }
      );
    }

    map.on("load", () => {
      ensureLayers();
      buildFilters();
      applyFilters();
      locateRider();
    });

    map.on("moveend", () => {
      if (settling) return;
      scheduleScan("pan");
    });

    map.on("click", (e) => {
      const hits = map.queryRenderedFeatures(e.point, {
        layers: ["trails-line", "trails-single"]
      });
      if (!hits.length) {
        hidePopup();
        return;
      }
      showPopup(hits[0], e.point);
    });

    document.getElementById("refreshBtn").addEventListener("click", () => {
      hidePopup();
      scanTrails("manual");
    });

    document.getElementById("recenterBtn").addEventListener("click", () => {
      locateRider();
    });

    document.getElementById("popupClose").addEventListener("click", hidePopup);
  </script>
</body>
</html>
