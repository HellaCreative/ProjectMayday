<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DIRT.</title>
  <style>
    :root {
      --bg: #0b0c0e;
      --panel: #141619;
      --panel-2: #1b1e22;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2f0eb;
      --muted: #8b8f96;
      --amber: #ff8a1e;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255, 138, 30, 0.12), transparent 55%),
        linear-gradient(180deg, #101215 0%, var(--bg) 45%, #08090b 100%);
    }

    .shell {
      width: min(520px, 100%);
    }

    .brand {
      font-family: var(--mono);
      font-size: clamp(3.2rem, 12vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 0.95;
      margin-bottom: 18px;
    }

    .brand span { color: var(--amber); }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
      max-width: 38ch;
      margin-bottom: 36px;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    a.card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 18px 18px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    a.card:hover {
      border-color: rgba(255, 138, 30, 0.45);
      background: var(--panel-2);
      transform: translateY(-1px);
    }

    a.card .label {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
    }

    a.card .title {
      font-size: 1.05rem;
      font-weight: 600;
    }

    a.card .desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.4;
      margin: 0;
    }

    footer {
      margin-top: 28px;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand">DIRT<span>.</span></div>
    <h1>Legal dirt near you.</h1>
    <p>Off-road trail finder for dual-sport riding. Grade filters, live map, no hiking clutter.</p>
    <nav class="links">
      <a class="card" href="app/index.html">
        <span class="label">Primary</span>
        <span class="title">Open map</span>
        <span class="desc">Geolocate, scan trails in view, filter by grade.</span>
      </a>
      <a class="card" href="diag/index.html">
        <span class="label">Diagnostic</span>
        <span class="title">Data pipe check</span>
        <span class="desc">Prove Overpass returns Nova Scotia trail geometry.</span>
      </a>
    </nav>
    <footer>HTML prototype · iOS next</footer>
  </main>
</body>
</html>
